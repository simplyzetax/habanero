+TextReplacements=(Category=Game, Namespace="", Key="C688D3B146BB4978FA7E9D8D7E952BE0", NativeString="EPIC GAMES", LocalizedStrings=(("ar","مكافأة تسجيل الدخول الخاصة بالمجتمع (25-26 أبريل)"),("en","COMMUNITY LOGIN REWARD (APRIL 25-26)"),("de","COMMUNITY-ANMELDEBELOHNUNG (25.–26. April)"),("es","RECOPENSA POR INICIAR SESIÓN DE LA COMUNIDAD (25-26 de abril)"),("es-419","RECOMPENSA POR INICIAR SESIÓN (25 Y 26 DE ABRIL)"),("fr","RÉCOMPENSE DE CONNEXION DE LA COMMUNAUTÉ (25 ET 26 AVRIL)"),("id","HADIAH LOGIN KOMUNITAS (25-26 APR)"),("it","RICOMPENSA DI ACCESSO DELLA COMMUNITY (25-26 APRILE)"),("ja","コミュニティログイン報酬(米国時間の4月25日～26日)"),("ko","커뮤니티 로그인 보상 (4월 25일~26일 미국 동부 시간)"),("pl","NAGRODA ZA LOGOWANIE DLA SPOŁECZNOŚCI (25–26 KWIETNIA)"),("pt-BR","RECOMPENSA DE LOGIN DA COMUNIDADE (25 E 26 DE ABRIL)"),("ru","НАГРАДА ЗА ВХОД ОТ СООБЩЕСТВА (25–27 АПРЕЛЯ)"),("th","รางวัลล็อกอินคอมมูนิตี้ (25-26 เมษายน)"),("tr","TOPLULUK GİRİŞ ÖDÜLÜ (25-26 NİSAN)"),("vi","PHẦN THƯỞNG ĐĂNG NHẬP CỘNG ĐỒNG (25-26/04)"),("zh-hans","社区登录奖励（4月25-26日）"),("zh-Hant","社群登入獎勵（4 月 25 日至 26 日）")))
+TextReplacements=(Category=Game, Namespace="", Key="A2C4536341DF717450A1AD81BB73AA47", NativeString="[PH] Hotfix Here", LocalizedStrings=(("ar","الاحتفال بإطلاق الكاريوكي في Fortnite، مع تحيات نادي المخاطرات العالية!"),("en","Celebrating the launch of Karaoke in Fortnite, courtesy of the High Stakes Club!"),("de","Zur Feier der Veröffentlichung von Karaoke in Fortnite mit freundlicher Unterstützung des Clubs der Nein-Sarger!"),("es","¡Celebramos el lanzamiento de Karaoke en Fortnite, por cortesía del Club de las estacas encadenadas!"),("es-419","¡Celebramos el lanzamiento de Karaoke en Fortnite, cortesía del Club de las estacas encadenadas!"),("fr","Pour fêter le lancement du mode Karaoké dans Fortnite, de la part du Club du Haut risque !"),("id","Merayakan peluncuran Karaoke di Fortnite, pemberian Klub High Stakes!"),("it","Festeggiamo il lancio di Karaoke in Fortnite, per gentile concessione del Club Puntate Alte!"),("ja","ハイステークスクラブのご厚意により、フォートナイトにカラオケ機能が実装されたことをお祝いしよう！"),("ko","Fortnite에 노래방 모드가 출시되었습니다. 하이 스테이크 클럽에서 보냈습니다!"),("pl","Świętujemy premierę Karaoke w Fortnite, prezent od Klubu Wysokiego Ryzyka!"),("pt-BR","Celebre a chegada do Karaokê ao Fortnite, cortesia do Clube do Alto Risco!"),("ru","Празднуем запуск караоке в Fortnite, особое предложение Клуба высоких ставок!"),("th","ฉลองการเปิดตัวคาราโอเกะใน Fortnite ด้วยความอนุเคราะห์จากคลับไฮสเตกส์!"),("tr","Fortnite'ta Karaoke'nin çıkışını Kalbe Kazık Kulübü'nün bir hediyesiyle kutluyoruz!"),("vi","Mừng Karaoke ra mắt trong Fortnite, nhờ góp sức của Câu Lạc Bộ Liều Lĩnh!"),("zh-hans","庆祝Fortnite中卡拉OK的推出，由高风险俱乐部提供！"),("zh-Hant","慶祝《Fortnite》卡拉 OK 正式登場，由血樁社友情提供！")))
