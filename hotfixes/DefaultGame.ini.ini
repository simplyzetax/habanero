+TextReplacements=(Category=Game, Namespace="", Key="F6750EB7440ABE59373FEC9E6E625534", NativeString="<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Represent the Academy, but make it hot. Complete Quests to earn cosmetics with the Supernova Academy Quest Pack.</>\r\n\r\n<text color=\"FFFD43FF\">Includes:</>", LocalizedStrings=(("ar","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">اكتشف كيف يمكن أن تكون الطبيعة تقنية بمساعدة منيرة. أكمِل المهام لربح عملات V-Bucks مع حزمة مهام الطبيعة التقنية.</>\r\n\r\n<text color=\"FFFD43FF\">تتضمن:</>"),("en","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Find out how nature can be perfected with the help of Luminesca. Complete Quests to earn V-Bucks with the Perfected Nature Quest Pack.</>\r\n\r\n<text color=\"FFFD43FF\">Includes:</>"),("de","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Erfahre mit Luminesca, wie die Natur perfektioniert werden kann. Schließe Aufträge ab und verdiene V-Bucks mit dem \"Perfektionierte Natur\"-Auftragspaket.</>\r\n\r\n<text color=\"FFFD43FF\">Enthält:</>"),("es","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Descubre cómo la naturaleza puede perfeccionarse con la ayuda de Lucila. Completa misiones y consigue paVos con las misiones de Naturaleza perfeccionada.</>\r\n\r\n<text color=\"FFFD43FF\">Incluye:</>"),("es-419","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Descubre cómo la naturaleza puede perfeccionarse con ayuda de Lucila. Completa misiones para obtener monedas V con el paquete de misiones de Naturaleza perfeccionada.</>\r\n\r\n<text color=\"FFFD43FF\">Incluye:</>"),("fr","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Apprenez à perfectionner la nature avec l'aide de Luminesca. Accomplissez des quêtes pour gagner des V-bucks grâce au pack de quêtes Nature parfaite.</>\r\n\r\n<text color=\"FFFD43FF\">Comprend :</>"),("id","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Temukan cara untuk menyempurnakan alam dengan bantuan Luminesca. Selesaikan Quest untuk mendapatkan V-Buck dengan Paket Quest Alam Sempurna.</>\r\n\r\n<text color=\"FFFD43FF\">Termasuk:</>"),("it","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Scopri come la natura può essere perfezionata con l'aiuto di Luminesca. Completa incarichi per ottenere V-buck con il pacchetto incarichi Natura perfezionata.</>\r\n\r\n<text color=\"FFFD43FF\">Include:</>"),("ja","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">ルミネスカが導きゆく自然の完成形を目撃せよ。パーフェクテッドネイチャー クエストパックでクエストをクリアして、V-Bucksを獲得しよう。</>\r\n\r\n<text color=\"FFFD43FF\">収録内容:</>"),("ko","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">루미네스카의 도움으로 자연이 어떻게 완벽해질 수 있는지 알아보세요. 완벽해진 자연 퀘스트 팩의 퀘스트를 완료하고 V-Bucks를 획득해 보세요.</>\r\n\r\n<text color=\"FFFD43FF\">구성품:</>"),("pl","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Dowiedz się, jak udoskonalić naturę z pomocą Luminy. Ukończ zadania z pakietu Natura Udoskonalona, by zdobyć V-dolce.</>\r\n\r\n<text color=\"FFFD43FF\">Zawiera:</>"),("pt-BR","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Aperfeiçoe a natureza com a ajuda da Luminesca. Conclua Tarefas para obter V-Bucks com o Pacote de Tarefas Natureza Aperfeiçoada.</>\r\n\r\n<text color=\"FFFD43FF\">Inclui:</>"),("ru","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Неонна поможет вам сделать природу поистине совершенной. Выполните испытания и получите В-баксы, воспользовавшись набором заданий «Совершенство от природы».</>\r\n\r\n<text color=\"FFFD43FF\">В наборе:</>"),("th","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">ค้นหาว่าธรรมชาติจะสมบูรณ์แบบได้ยังไง ด้วยความช่วยเหลือของลูมิเนสก้า ทำเควสต์ให้สำเร็จเพื่อรับวีบั๊ก ด้วยแพ็กเควสต์ธรรมชาติสมบูรณ์แบบ</>\r\n\r\n<text color=\"FFFD43FF\">ประกอบด้วย:</>"),("tr","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Işıl'ın yardımıyla doğanın nasıl mükemmelleştirilebileceğini keşfet. Doğa Bilgini Görev Paketi'yle V-Papel kazanmak için görevleri tamamla.</>\r\n\r\n<text color=\"FFFD43FF\">Şunları içerir:</>"),("vi","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">Khám phá tự nhiên thuần chất đến phát ngất cùng Luminesca. Hoàn thành loạt Nhiệm Vụ để nhận V-Buck với Gói Nhiệm Vụ Tự Nhiên Thuần Chất.</>\r\n\r\n<text color=\"FFFD43FF\">Bao gồm:</>"),("zh-hans","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">在冷光绿的帮助下，了解如何让自然变得更完美。使用完美本源任务组合包完成任务，赚取V币。</>\r\n\r\n<text color=\"FFFD43FF\">包含：</>"),("zh-Hant","<text color=\"FFFFFFFF\" fontface=\"black\" size=\"20\" Case=\"AllCaps\">在露米涅卡的指引下，見證大自然的奧秘。使用完美大自然任務包完成任務即可贏得 V-Buck。</>\r\n\r\n<text color=\"FFFD43FF\">內含：</>")))
