+TextReplacements=(Category=Game, Namespace="", Key="7C39A75B4933C4A7B38FF7A04C23D886", NativeString="Use the Invite a Friend button on your mobile sidebar to recruit a friend to play Fortnite", LocalizedStrings=(("ar","استخدم زر دعوة صديق على الشريط الجانبي في علامة تبويب إضافة أصدقاء في جهازك المحمول لضم صديق إليك للعب Fortnite"),("en","Use the Invite a Friend button in the Add friends tab on your mobile sidebar to recruit a friend to play Fortnite"),("de","Nutze die \"Einen Freund einladen\"-Schaltfläche im Reiter \"Freunde hinzufügen\" in der Seitenleiste deines Mobilgeräts, um einen Freund zum Spielen von Fortnite einzuladen"),("es","Usa el botón \"Invitar a un amigo\" en la pestaña Añadir amigo de tu dispositivo para invitar a un amigo a jugar a Fortnite"),("es-419","Usa el botón \"Invitar a un amigo\" en la pestaña \"Añadir amigos\" en la barra lateral de tu dispositivo móvil para invitar a un amigo a Fortnite"),("fr","Utilisez le bouton Inviter un ami dans l’onglet Ajouter des amis dans la barre latérale de votre mobile pour recruter un ami afin de jouer à Fortnite"),("id","Pakai tombol Undang Teman dari tab Tambah Teman di sidebar ponsel untuk mengajak teman bermain Fortnite"),("it","Usa il pulsante Invita un amico nella scheda Aggiungi amici della barra laterale su dispositivi mobili per invitare un amico a giocare a Fortnite"),("ja","モバイルアプリのサイドバーにある「フレンドに追加」タブの「フレンドを招待する」ボタンから、フレンドを招待してフォートナイトをプレイしよう"),("ko","모바일 사이드바의 친구 추가 탭에 있는 친구 초대 버튼으로 포트나이트를 플레이할 친구 영입"),("pl","Użyj przycisku Zaproś znajomego w zakładce Dodaj znajomych na pasku bocznym na urządzeniu mobilnym, aby zaprosić znajomego do gry w Fortnite."),("pt-BR","Use o botão Convide uma Amizade na aba Adicionar Amigos na barra lateral do dispositivo móvel para recrutar uma amizade para jogar Fortnite"),("ru","Пригласите друга в мобильной версии Fortnite, нажав кнопку «Пригласить друга» на вкладке «Добавить друзей» боковой панели"),("th","ใช้ปุ่มชวนเพื่อนในแท็บเพิ่มเพื่อนบนแถบเมนูด้านข้างในมือถือของ