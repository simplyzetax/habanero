+TextReplacements=(Category=Game, Namespace="", Key="2EE5293D4F6F4BFB282DBF9960AA73C0", NativeString="I went squibbly-to-squibbly against him in a duel once.", LocalizedStrings=(("ar","خضت معه مواجهة سكويبلي لسكويبلي ذات مرة."),("en","I went squibbly-to-squibbly against him in a rivalry once."),("de","Ich habe es einmal bei einer Rivalität auf Squibbly-Art mit ihm aufgenommen."),("es","Una vez, tuvimos un enfrentamiento de lo más tentacular."),("es-419","Una vez, tuvimos un enfrentamiento de lo más tentacular."),("fr","Une fois, je l'ai affronté en duel et on était au coude à coude."),("id","Aku pernah berduel satu-lawan-satu langsung dengannya."),("it","Una volta è stato mio rivale, una vera sfida all'ultima squama."),("ja","かつて、ライバルとしてあいつと真っ向から対決したことがある。"),("ko","전에 녀석과 스퀴블리 대 스퀴블리로 라이벌 대격돌을 벌인 적이 있어."),("pl","Kiedyś rywalizowaliśmy jak Kałamaluch z Kałamaluchem."),("pt-BR","Tenho rivalidade com ele, teve uma vez que foi tiro, tentáculo e bomba."),("ru","Однажды мы с ним схлестнулись в противостоянии."),("th","ฉันเคยสู้กับเขาตัวต่อตัวชนิดที่ว่าหนวดพันกันอีนุงตุงนัง"),("tr","Onunla bir kez rekabette kıran kırana mücadele etmiştim."),("vi","Tôi đã từng đối đầu nảy lửa với hắn trong một trận quyết chiến kình địch."),("zh-hans","我曾和他以鱿鱿的方式对决过一次。"),("zh-Hant","我曾與他魷魷對戰。")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="C5F4EB4B42395F5AC97749BB21418868", NativeString="Requires play on the <HighlightBlue>Fortnite mobile app</>, which is downloaded from the <HighlightBlue>Epic Games Store App</> on mobile or other supported storefronts. Rewards cannot be earned via streaming on mobile devices.", LocalizedStrings=(("en","Requires play on the <HighlightBlue>Fortnite mobile app</>, which is downloaded from the <HighlightBlue>Epic Games Store App</> on mobile or other supported mobile storefronts. Rewards cannot be earned via streaming on mobile devices.")))
+TextReplacements=(Category=Game, Namespace="", Key="C17817E544B97EFA98DD00A7B4ABDFFD", NativeString="Playing Battle Royale during the Promotion Period automatically enters you into the Fortnite Showdown Contest (\"Contest\"). Open to eligible players 13 years of age or older in participating regions. No purchase necessary. Top 250 players are eligible for Prizes.  Turn off public stats in your settings to opt out of the Contest. See full details in the Fortnite Showdown Official Rules.", LocalizedStrings=(("ar","يؤدي لعب باتل رويال خلال فترة العرض الترويجي إلى إدخالك تلقائيًا في مسابقة Fortnite المواجهة الحاسمة (المسابقة). وهي متاحة للاعبين المؤهلين الذين تبلغ أعمارهم 13 عامًا أو أكثر في المناطق المشاركة. لا يلزم إجراء أي عملية شراء للمشاركة. ستُمنح الجوائز وفق أداء اللاعبين ومراتبهم النهائية على لوحة المتصدرين.. عطّل الإحصائيات العامة في إعداداتك لإلغاء مشاركتك في المسابقة. اطّلع على التفاصيل الكاملة في القواعد الرسمية لـFortnite المواجهة الحاسمة."),("en","Playing Battle Royale during the Promotion Period automatically enters you into the Fortnite Showdown Contest (\"Contest\"). Open to eligible players 13 years of age or older in participating regions. No purchase necessary. Prizes will be awarded based on player performance and final leaderboard standings. Turn off public stats in your settings to opt out of the Contest. See full details in the Fortnite Showdown Official Rules."),("de","Wenn du während des Aktionszeitraums Battle Royale spielst, nimmst du automatisch am Fortnite-Showdown-Wettbewerb (\"Wettbewerb\") teil. Teilnahme möglich für berechtigte Spieler ab 13 Jahren in teilnehmenden Regionen. Kein Kauf erforderlich. Preise basieren auf der Leistung der Spieler und der endgültigen Platzierung auf der Bestenliste. Deaktiviere in deinen Einstellungen die öffentliche Statistik, um nicht am Wettbewerb teilzunehmen. Die vollständigen Details findest du in den offiziellen Regeln für den Fortnite-Showdown."),("es","Jugar a Battle Royale durante el periodo de la promoción te inscribe automáticamente en el concurso Duelo final (\"Concurso\"). Abierto a jugadores aptos de 13 años o más en las regiones participantes. No es necesario realizar ninguna compra. Los premios se otorgarán según el rendimiento y los puestos del marcador finales. Desactiva las estadísticas públicas en los ajustes para dejar de participar en el evento. Consulta todos los detalles en las reglas oficiales de Duelo final."),("es-419","Jugar Batalla campal durante el periodo de la promoción te registra automáticamente en el concurso de Fortnite: Duelo final (\"Concurso\"). Disponible para jugadores de 13 años de edad o más en las regiones participantes. No es necesario realizar ninguna compra. Los premios se otorgarán según el rendimiento del jugador y la posición final en la tabla de clasificación. Desactiva las estadísticas públicas en los ajustes para darte de baja del concurso. Consulta todos los detalles en el reglamento oficial de Fortnite: Duelo final."),("fr","Jouer à Battle Royale pendant la période de promotion vous inscrit automatiquement au concours Fortnite Rivalités (\"Concours\"). Ouvert aux joueurs éligibles âgés de 13 ans ou plus dans les régions participantes. Aucun achat requis. Les prix seront décernés en fonction des performances et du classement final. Désactivez les statistiques publiques dans vos paramètres pour vous retirer du Concours. Pour connaître tous les détails, consultez le règlement officiel du Concours Fortnite Rivalités."),("id","Bermain Battle Royale selama Periode Promosi secara otomatis mendaftarkanmu ke dalam Kontes Fortnite Showdown (\"Kontes\"). Terbuka untuk pemain yang memenuhi syarat berusia 13 tahun atau lebih di wilayah yang berpartisipasi. Tidak perlu pembelian. Hadiah akan diberikan berdasarkan performa pemain dan posisi final di daftar peringkat. Matikan stat publik di pengaturanmu untuk membatalkan keikutsertaan Kontes. Lihat detail lengkap di Aturan Resmi Fortnite Showdown."),("it","Otterrai automaticamente accesso al concorso Fortnite Scontro finale (\"Concorso\") giocando a Battaglia reale durante il periodo della promozione. Aperto ai giocatori idonei dai 13 anni in su nelle regioni partecipanti. Nessun acquisto necessario. I premi saranno assegnati in base alla performance di ogni giocatore e alle posizioni raggiunte nella graduatoria finale. Disattiva le statistiche pubbliche nelle impostazioni per rinunciare a partecipare al concorso. Per tutti i dettagli, consulta il Regolamento ufficiale di Fortnite Scontro finale."),("ja","プロモーション期間中にバトルロイヤルをプレイすると、自動的にフォートナイト・ショーダウン コンテスト(以下、\"コンテスト\")にエントリーされます。参加可能な地域の13歳以上の対象プレイヤーが参加できます。コンテンツを購入する必要はありません。プレイ成績とランキングの最終順位に応じて賞品が授与されます。コンテストに出場しない場合は設定で統計データの公開をオフにしてください。詳細は、フォートナイト・ショーダウン公式規定をご確認ください。"),("ko","프로모션 기간에 배틀로얄을 플레이하면 포트나이트 쇼다운 대회(\"대회\")에 자동으로 참여하게 됩니다. 참여 가능 지역 내 자격을 갖춘 13세 이상의 플레이어가 참여할 수 있습니다. 구매가 필요하지 않습니다. 상품은 플레이어의 성적과 최종 순위표 결과에 따라 주어집니다. 대회 참여를 원하지 않는 경우 설정에서 공개 통계를 '끄기'로 설정하세요. 자세한 정보는 포트나이트 쇼다운 공식 규정을 확인하세요."),("pl","Gra w trybie Battle Royale w okresie promocji automatycznie uprawnia do wzięcia udziału w konkursie Fortnite: Starcie (\"Konkurs\"). Dostępny dla kwalifikujących się graczy w wieku 13 lat lub starszych w uczestniczących regionach. Zakup nie jest wymagany. Nagrody będą przyznawane w oparciu o wyniki graczy i pozycje w rankingu finałowym. Wyłącz statystyki publiczne w ustawieniach, aby zrezygnować z udziału w Konkursie. Szczegółowe informacje znajdziesz w oficjalnym regulaminie Fortnite: Starcie."),("pt-BR","Jogar Battle Royale durante o Período da Promoção inscreve você automaticamente na Competição Fortnite: Acerto de Contas (\"Competição\"). Aberto a todas as pessoas a partir dos 13 anos de idade ou mais, nas regiões participantes. Nenhuma compra necessária. Prêmios serão concedidos com base no desempenho e colocação final na tabela de liderança. Desative as estatísticas públicas nas suas configurações para sair da competição. Para saber todos os detalhes, veja as Regras Oficiais do Fortnite: Acerto de Contas."),("ru","Играя в «Королевскую битву» в период проведения акции, вы автоматически становитесь участником состязания Fortnite: «Противостояние» («Состязание»). Участвовать могут игроки из соответствующих регионов в возрасте от 13 лет. Покупка не требуется. Вероятность получения приза зависит от результатов игрока и его итогового места в списке лидеров. Чтобы отказаться от участия в состязании, отключите общедоступную статистику в настройках. Все подробности можно узнать в официальных правилах Fortnite: «Противостояние»."),("th","เพียงแค่เล่นแบทเทิลรอยัลในช่วงเวลากิจกรรม แล้วคุณจะได้เข้าร่วมการแข่งขัน Fortnite: ศึกท้าชน (\"การแข่งขัน\") โดยอัตโนมัติ เปิดให้ผู้เล่นที่มีคุณสมบัติตามเกณฑ์ซึ่งมีอายุ 13 ปีขึ้นไปในภูมิภาคที่เข้าร่วม ไม่จำเป็นต้องซื้อสินค้าเพื่อเข้าร่วม รางวัลจะส่งมอบให้ตามผลงานและอันดับบนตารางอันดับเมื่อสิ้นสุดการแข่งขัน หากคุณไม่ต้องการเข้าร่วมแข่งขัน คุณสามารถปิดสถิติสาธารณะในการตั้งค่าได้ ดูรายละเอียดทั้งหมดได้ที่กฎอย่างเป็นทางการของ Fortnite: ศึกท้าชน"),("tr","Promosyon Dönemi boyunca Battle Royale oynamak, Fortnite - Hesaplaşma Yarışması'na (\"Yarışma\") otomatik olarak katılmanı sağlar. Katılımcı bölgelerde 13 yaş veya üzeri uygun oyuncular katılabilir. Satın alım gerekmez. Ödüller oyuncuların performansına ve son sıralama tablolarına göre verilir. Yarışmaya katılmamak için ayarlarından herkese açık istatistikleri kapat. Ayrıntıların tamamı için Fortnite - Hesaplaşma Resmi Kurallar'ına göz at."),("vi","Khi chơi Cuộc Chiến Sinh Tồn trong Thời Gian Khuyến Mãi, bạn sẽ tự động tham gia Cuộc Thi Fortnite Tranh Bá (gọi tắt là \"Cuộc Thi\"). Dành cho người chơi đủ điều kiện từ 13 tuổi trở lên tại các khu vực tham gia. Không cần mua hàng. Giải thưởng sẽ được trao dựa trên thành tích của người chơi và thứ hạng chung cuộc trên bảng xếp hạng. Hãy tắt chỉ số công khai trong cài đặt của bạn để từ chối tham gia Cuộc Thi. Xem chi tiết đầy đủ trong Quy Định Chính Thức của Fortnite Tranh Bá."),("zh-hans","在推广期内参与大逃杀模式，即视为自动报名参加Fortnite决战在即竞赛（\"竞赛\"）。竞赛面向参与地区年满13周岁且符合条件的玩家开放，无需购买即可参与。奖品将依据玩家在赛事中的表现以及最终排行榜排名情况发放。在设置中关闭公开统计数据即可退出本次比赛。完整详情请参见《Fortnite决战在即官方规则》。"),("zh-Hant","在推廣期間遊玩《大逃殺》，即自動取得《Fortnite 全面開戰》競賽（以下簡稱「競賽」）的參賽資格。本活動僅開放給參賽區域內年滿 13 歲的合資格玩家。無需購買。獎勵取決於玩家表現及最終排行榜時的名次。若要退出競賽，請在設定中關閉公開數據。詳情請參閱《Fortnite 全面開戰》官方規則。")))
