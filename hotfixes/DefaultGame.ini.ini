+TextReplacements=(Category=Game, Namespace="", Key="FBBE6ED7446029B00B6B8086A5877B9C", NativeString="TBC", LocalizedStrings=(("ar","تتمدد الطائرة الشراعية من الحقيبة النفاثة عند تجهيزها مع بظ يطير. تظهر الطائرة الشراعية بشكل مختلف في الوقت الحالي عند تجهيزها مع أزياء أخرى بسبب خلل بصري."),("en","Glider extends from jetpack when equipped with Buzz Lightyear. Glider currently appears differently when equipped with other outfits due to a visual bug."),("de","Der Hängegleiter lässt sich aus dem Jetpack ausfahren, wenn Buzz Lightyear ausgerüstet ist. Aufgrund eines Grafikfehlers sieht der Hängegleiter derzeit anders aus, wenn er mit anderen Outfits ausgerüstet ist."),("es","El ala delta se despliega desde el propulsor cuando se equipa con Buzz Lightyear. Actualmente, el ala delta se muestra de forma diferente cuando se equipa con otros trajes debido a un error visual."),("es-419","El planeador se despliega desde la mochila propulsora al equiparlo con Buzz Lightyear. Actualmente, el planeador se ve diferente al equiparlo con otros atuendos debido a un error visual."),("fr","Le planeur sort du jetpack quand vous l'équipez avec Buzz l'Éclair. Le planeur apparaît actuellement différemment quand vous l'équipeez avec d'autres tenues en raison d'un bug visuel."),("id","Glider terbentang dari jetpack saat dipasangkan dengan Buzz Lightyear. Saat ini, bug visual menyebabkan Glider terlihat berbeda saat dipasangkan dengan Kostum lain."),("it","Il deltaplano si estende dal jetpack quando è equipaggiato con Buzz Lightyear. Al momento, il deltaplano appare in modo diverso quando è equipaggiato con altri costumi a causa di un bug visivo."),("ja","バズ・ライトイヤーがグライダーを装備すると、ジェットパックからグライダーが展開されます。視覚的な不具合により、他のコスチュームでグライダーを装備すると、見た目が異なって表示されます。"),("ko","버즈 라이트이어 장착 시 제트팩에서 글라이더가 펼쳐집니다. 현재 시각적 버그로 인해 다른 의상 장착 시 글라이더가 다르게 나타납니다."),("pl","Lotnia rozkłada się z plecaka odrzutowego po wyposażeniu Buzza Astrala. Lotnia wygląda inaczej po wyposażeniu innych strojów z powodu błędu wizualnego."),("pt-BR","A asa-delta se estende a partir da mochila a jato quando equipada com o Buzz Lightyear. No momento, a asa-delta tem uma aparência diferente quando equipada com outros trajes devido a um bug visual."),("ru","Дельтаплан выдвигается из реактивного ранца при использовании с экипировкой Базза Лайтера. С другими экипировками из-за визуальной ошибки он может выглядеть иначе."),("th","เครื่องร่อนจะต่อเสริมกับเจ็ตแพ็กเมื่อบัซ ไลท์เยียร์สวมใส่ ตอนนี้เครื่องร่อนจะแสดงผลเป็นอย่างอื่นเมื่อสวมคู่กับเครื่องแต่งกายอื่นๆ เนื่องจากบั๊กการแสดงผล"),("tr","Buzz Lightyear ile kuşanıldığında planör sırt roketinden uzanır. Görsel bir hata nedeniyle planör şu anda diğer kıyafetlerle kuşanıldığında farklı görünüyor."),("vi","Du lượn bung ra từ ba lô phản lực khi trang bị cùng Buzz Lightyear. Dù lượn hiện đang hiển thị sai khi trang bị cùng các trang phục khác do lỗi đồ họa."),("zh-hans","装备巴斯光年时，滑翔伞会从喷气背包中展开。由于一个视觉效果错误，目前与其他皮肤一起装备时，滑翔伞的显示会有所不同。"),("zh-Hant","在裝備巴斯光年時，滑翔翼會從噴射背包中延伸出來。由於一個視覺錯誤，目前滑翔翼在與其他造型一起裝備時，會呈現不同的外觀。")))
