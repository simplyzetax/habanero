+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="258F019E491157E5B5887B8BD33B07D6", NativeString="Eliminate Rivals in Battle Royale to earn points for your team.\r\n\r\nThe winning team’s Bonus Outfit unlocks for all players who own the Battle Pass at the end of the season.", LocalizedStrings=(("fr","Éliminez des rivaux en mode Battle Royale pour marquer des points pour votre camp.\r\n\r\nLa tenue bonus du camp victorieux se déverrouille pour tous les joueurs possédant le Passe de combat à la fin de la saison."),("th","กำจัดคู่ปรับในโหมดแบทเทิลรอยัล เพื่อรับคะแนนสำหรับทีมของคุณ\r\n\r\nจะปลดล็อกโบนัสเครื่องแต่งกายของทีมผู้ชนะให้กับผู้เล่นทุกคนที่มีแบทเทิลพาส\r\nเมื่อจบซีซั่น")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="DE2C19CD4DBD63B9CBB2C19FD97DEF03", NativeString="Eliminate Rivals in Battle Royale to earn points for your team.\r\nThe winning team’s Bonus Outfit unlocks for all players who own the Battle Pass at the end of the season.", LocalizedStrings=(("fr","Éliminez des rivaux en mode Battle Royale pour marquer des points pour votre camp.\r\nLa tenue bonus du camp victorieux se déverrouille pour tous les joueurs possédant le Passe de combat à la fin de la saison."),("th","กำจัดคู่ปรับในโหมดแบทเทิลรอยัล เพื่อรับคะแนนสำหรับทีมของคุณ\r\nจะปลดล็อกโบนัสเครื่องแต่งกายของทีมผู้ชนะให้กับผู้เล่นทุกคนที่มีแบทเทิลพาส\r\nเมื่อจบซีซั่น")))
