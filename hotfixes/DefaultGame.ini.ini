+TextReplacements=(Category=Game, Namespace="", Key="A9FDFE8E4D2BA91CB2E1D490B6060374", NativeString="Let's go Extracting! Power Hour", LocalizedStrings=(("ar","مزيد من الأرواح الذهبية!"),("en","More Gold Sprites!"),("de","Mehr Gold-Geister!"),("es","¡Más espíritus dorados!"),("es-419","¡Más espíritus dorados!"),("fr","Plus d'esprits dorés !"),("id","Lebih Banyak Sprite Emas!"),("it","Altri spiritelli dorati!"),("ja","ゴールドの精霊が出現率アップ！"),("ko","더 많은 골드 정령!"),("pl","Więcej Złotych Duszków!"),("pt-BR","Mais Elementais Dourados!"),("ru","Больше золотых духов\!"),("th","สไปรต์สีทองเพิ่มขึ้น\!"),("tr","Daha Fazla Altın Büyücük!"),("vi","Thêm Nhiều Tinh Linh Vàng!"),("zh-hans","更多黄金精灵！"),("zh-Hant","更多黃金精靈！")))
+TextReplacements=(Category=Game, Namespace="", Key="917E8FA045BB983E9EA7238FA3C2AAD9", NativeString="Gone in 67 Seconds Power Hour", LocalizedStrings=(("ar","مزيد من الأرواح الهلامية!"),("en","More Gummy Sprites!"),("de","Mehr Gummi-Geister!"),("es","¡Más espíritus golosina!"),("es-419","¡Más espíritus golosina!"),("fr","Plus d'esprits gélifiés !"),("id","Lebih Banyak Sprite Jeli!"),("it","Altri spiritelli gommosi!"),("ja","グミの精霊が出現率アップ！"),("ko","더 많은 젤리 정령!"),("pl","Więcej Żelkowych Duszków!"),("pt-BR","Mais Elementais Gelatinosos!"),("ru","Больше мармеладных духов\!"),("th","สไปรต์กัมมี่เพิ่มขึ้น\!"),("tr","Daha Fazla Şeker Büyücük!"),("vi","Thêm Nhiều Tinh Linh Kẹo Dẻo!"),("zh-hans","更多软糖精灵！"),("zh-Hant","更多軟糖精靈！")))
+TextReplacements=(Category=Game, Namespace="", Key="05077D5643D058381F7F51B5A9953874", NativeString="Grants cloak for a duration upon reloading. Increases in duration at each Level Up: 2 Seconds -> 2.5 Seconds -> 3 Seconds -> 3.5 Seconds -> 4 Seconds", LocalizedStrings=(("ar","يمنحك عباءة تخفي لفترة محددة عند إعادة التلقيم. تزداد المدة عند رفع كل مستوى بمقدار: 6 ثوانٍ -> 7 ثوانٍ -> 8 ثوانٍ -> 9 ثوانٍ -> 10 ثوانٍ"),("en","Grants cloak for a duration upon reloading. Increases in duration at each Level Up: 3 Seconds -> 3.5 Seconds -> 4 Seconds -> 4.5 Seconds -> 5 Seconds"),("de","Verleiht beim Nachladen für bestimmte Zeit Tarnung. Die Dauer erhöht sich mit jedem Levelaufstieg: 3 Sekunden -> 3,5 Sekunden -> 4 Sekunden -> 4,5 Sekunden -> 5 Sekunden."),("es","Otorga camuflaje durante un tiempo al recargar. A medida que sube de nivel, aumenta la duración: 3 segundos -> 3,5 segundos -> 4 segundos -> 4,5 segundos -> 5 segundos."),("es-419","Otorga modo sigilo por un tiempo al recargar. Aumenta la duración con cada subida de nivel: 3 segundos -> 3.5 segundos -> 4 segundos -> 4.5 segundos -> 5 segundos."),("fr","Confère l'effet Camouflage pendant une certaine durée après un rechargement. Augmente la durée à chaque gain de niveau : 3 secondes -> 3,5 secondes -> 4 secondes -> 4,5 secondes -> 5 secondes."),("id","Memberikan jubah untuk durasi tertentu saat mengisi ulang. Durasi meningkat tiap kali Naik Level: 3 Detik -> 3,5 Detik -> 4 Detik -> 4,5 Detik -> 5 Detik"),("it","Conferisce mantello per un periodo dopo la ricarica. La durata è maggiore per ogni aumento di livello: 3 secondi -> 3,5 secondi -> 4 secondi -> 4,5 secondi -> 5 secondi"),("ja","リロード時に一定時間クロークを付与する。レベルアップのたびに持続時間がアップ: 3秒 -> 3.5秒 -> 4秒 -> 4.5秒 -> 5秒"),("ko","재장전 시 일정 시간 동안 망토를 적용합니다. 레벨이 오를 때마다 지속 시간 증가: 6초 -> 7초 -> 8초 -> 9초 -> 10초"),("pl","Po przeładowaniu zapewnia kamuflaż na pewien czas. Czas trwania zwiększa się przy każdym awansie: 3 sekundy -> 3,5 sekundy -> 4 sekundy -> 4,5 sekundy -> 5 sekund"),("pt-BR","Concede invisibilidade por um período ao recarregar. Aumenta a duração a cada Subida de Nível: 3 Segundos -> 3,5 Segundos -> 4 Segundos -> 4,5 Segundos -> 5 Segundos"),("ru","Вы ненадолго становитесь невидимкой при перезарядке оружия. С каждым новым уровнем время действия маскировки увеличивается: 3 сек. -> 3,5 сек. -> 4 сек. -> 4,5 сек. -> 5 сек."),("th","มอบการล่องหนเป็นระยะเวลาหนึ่งเมื่อโหลดกระสุนใหม่ ระยะเวลาจะเพิ่มขึ้นทุกครั้งที่เลเวลอัป: 3 วินาที -> 3.5 วินาที -> 4 วินาที -> 4.5 วินาที -> 5 วินาที"),("tr","Mermi doldurduktan sonra belirli bir süre boyunca kamuflaj sağlar. Seviye atladıkça süre artar: 3 Saniye -> 3,5 Saniye -> 4 Saniye -> 4,5 Saniye -> 5 Saniye"),("vi","Việc nạp đạn sẽ kích hoạt giấu mình trong một khoảng thời gian. Khoảng thời gian sẽ dài thêm sau mỗi lần Tăng Cấp: 3 Giây -> 3.5 Giây -> 4 Giây -> 4.5 Giây -> 5 Giây"),("zh-hans","装填子弹时获得一段时间的隐形效果。每次升级时持续时间增加：3秒->3.5秒->4秒->4.5秒->5秒"),("zh-Hant","裝填子彈時，賦予一段時間的隱形效果。每次升級時，持續時間增加：3 秒 -> 3.5 秒 -> 4 秒 -> 4.5 秒 -> 5 秒")))
+TextReplacements=(Category=Game, Namespace="", Key="2318C0D447941237288351B7B6BF3474", NativeString="Emoting or Jamming replenishes shields. Increases in power at each Level Up: 1 Shield -> 2 Shield -> 3 Shield -> 4 Shield -> 5 Shield per tick", LocalizedStrings=(("ar","الرقص أو العزف يجدد الدروع تزداد المدة عند رفع كل مستوى بمقدار: 2 درع - > 3 درع - > 4 درع - > 6 درع - > 8 درع لكل ثانية"),("en","Emoting or Jamming replenishes shields. Increases in power at each Level Up: 2 Shield -> 3 Shield -> 4 Shield -> 6 Shield -> 8 Shield per tick"),("de","Emotes oder das Spielen von Musik stellt Schilde wieder her. Die Wirkung erhöht sich mit jedem Levelaufstieg: 2 Schilde -> 3 Schilde -> 4 Schilde -> 6 Schilde -> 8 Schilde pro Tick."),("es","Hacer un gesto o improvisar restaura el escudo. A medida que sube de nivel, aumenta el escudo por pulsación: 2 de escudo -> 3 de escudo -> 4 de escudo -> 6 de escudo -> 8 de escudo."),("es-419","Usar gestos o improvisar recarga el escudo. Aumenta el poder con cada subida de nivel: 2 de escudo -> 3 de escudo -> 4 de escudo -> 6 de escudo -> 8 de escudo por cada activación."),("fr","Recharge le bouclier quand vous utilisez une emote ou jouez de la musique. Augmente en puissance à chaque gain de niveau : 2 points de bouclier -> 3 points de bouclier -> 4 points de bouclier -> 6 points de bouclier -> 8 points de bouclier par application."),("id","Menggunakan Emot atau Jamming akan memulihkan perisai. Meningkat dalam kekuatan tiap kali Naik Level: 2 Perisai -> 3 Perisai -> 4 Perisai -> 6 Perisai -> 8 Perisai per tick"),("it","Eseguire emote o jam ricarica gli scudi. Acquisisci potere a ogni aumento di livello: 2 scudi -> 3 scudi -> 4 scudi -> 6 scudi -> 8 scudi per unità di tempo"),("ja","エモートかジャムセッションでシールドが回復する。レベルアップのたびにパワーアップ: 2シールド -> 3シールド -> 4シールド -> 6シールド -> 8シールドが1度に回復するぞ"),("ko","이모트를 사용하거나 잼을 하면 보호막을 회복합니다. 레벨업 시 위력 증가: 틱당 보호막 2 -> 보호막 3 -> 보호막 4 -> 보호막 6 -> 보호막 8"),("pl","Wykonywanie emotek i jamowanie uzupełnia osłony. Moc zwiększa się przy każdym awansie: 2 osłony -> 3 osłony -> 4 osłony -> 6 osłon -> 8 osłon na impuls"),("pt-BR","Realizar gestos ou improvisos recarrega o escudo. Aumenta o poder a cada Subida de Nível: 2 de Escudo -> 3 de Escudo -> 4 de Escudo -> 6 de Escudo -> 8 de Escudo por ciclo"),("ru","Вы заряжаете щиты, когда используете эмоции или проводите джем-сессии. С каждым новым уровнем количество заряда щита за единицу времени возрастает: 2 ед. -> 3 ед. -> 4 ед. -> 6 ед. -> 8 ед."),("th","การใช้อีโมตหรือแจมจะฟื้นฟูเกราะ เกราะจะเพิ่มขึ้นทุกครั้งที่เลเวลอัป: 2 หน่วย -> 3 หน่วย -> 4 หน่วย -> 6 หน่วย -> 8 หน่วย ต่อช่วงเวลา"),("tr","İfade kullanmak veya müzik yapmak kalkanları yeniler. Seviye atladıkça gücü artar: Her eşikte 2 Kalkan -> 3 Kalkan -> 4 Kalkan -> 6 Kalkan -> 8 Kalkan"),("vi","Thực hiện Động Tác hoặc Biến Tấu sẽ giúp hồi phục khiên. Tăng sức mạnh sau mỗi lần Tăng Cấp: 2 Khiên -> 3 Khiên -> 4 Khiên -> 6 Khiên -> 8 Khiên mỗi lần hồi"),("zh-hans","使用姿势或即兴演奏可恢复护盾。每次升级时效果提升：每次恢复2点护盾->3点护盾->4点护盾->6点护盾->8点护盾"),("zh-Hant","做表情動作或即興演奏可恢復屏障力場。每次升級時能力提升：每次恢復 2 點護盾 -> 3 點護盾 -> 4 點護盾 -> 6 點護盾 -> 8 點護盾")))
+TextReplacements=(Category=Game, Namespace="", Key="FD49692643B3D7627FA727821C12FD77", NativeString="Your Pickaxe deals more damage. Increases in damage at each Level Up: 25% -> 50% -> 75% -> 100% -> 125% bonus damage", LocalizedStrings=(("ar","ستلحق فأسك ضررًا أكبر. يزداد الضرر عند رفع كل مستوى: ضرر بنسبة 25% -> 50% -> 75% -> 100% -> 125% إضافي"),("en","Your Pickaxe deals more damage. Increases in damage at each Level Up: 30 -> 40 -> 60 -> 80 -> 120 bonus damage"),("de","Deine Spitzhacke verursacht mehr Schaden. Der Schaden erhöht sich mit jedem Levelaufstieg: 30 -> 40 -> 60 -> 80 -> 120 Bonusschaden."),("es","Tu pico inflige más daño. A medida que sube de nivel, aumenta el daño adicional: 30 -> 40 -> 60 -> 80 -> 120."),("es-419","Tu pico inflige más daño. Aumenta el daño en cada subida de nivel: 30 % -> 40 % -> 60 % -> 80 % -> 120 % de daño adicional."),("fr","Augmente les dégâts de votre pioche. Les dégâts augmentent à chaque gain de niveau : 30% -> 40% -> 60% -> 80% -> 120% de dégâts bonus."),("id","Beliungmu menimbulkan damage yang lebih besar. Meningkat dalam damage tiap kali Naik Level: 30 -> 40 -> 60 -> 80 -> 120 damage bonus"),("it","Il tuo piccone infligge più danni. I danni salgono a ogni aumento di livello: 30 -> 40 -> 60 -> 80 -> 120 danni aggiuntivi"),("ja","ツルハシの与ダメージが増加する。レベルアップのたびにダメージアップ: 30% -> 40% -> 60% -> 80% -> 120%とダメージ量が増加"),("ko","곡괭이로 주는 피해가 증가합니다. 레벨이 오를 때마다 피해 증가: 추가 피해 25% -> 50% -> 75% -> 100% -> 125%"),("pl","Twój kilof zadaje więcej obrażeń. Obrażenia zwiększają się przy każdym awansie: 30% -> 40% -> 60% -> 80% -> 120% premii do obrażeń"),("pt-BR","Sua Picareta causa mais dano. Aumenta o dano a cada Subida de Nível: 30 -> 40 -> 60 -> 80 -> 120 de dano adicional"),("ru","Ваша кирка наносит больше урона. С каждым новым уровнем количество дополнительного наносимого урона увеличивается: 30 -> 40 -> 60 -> 80 -> 120."),("th","ขวานเจาะของคุณสร้างความเสียหายเพิ่มขึ้น ความเสียหายจะเพิ่มขึ้นทุกครั้งที่เลเวลอัป: โบนัสความเสียหาย 30 -> 40 -> 60 -> 80 -> 120"),("tr","Kazman daha fazla hasar verir. Seviye atladıkça hasar artar: 30 -> 40 -> 60 -> 80 -> 120 ek hasar"),("vi","Chiến Cụ của bạn gây nhiều sát thương hơn. Tăng dần sát thương sau mỗi lần Tăng Cấp: 30 -> 40 -> 60 -> 80 -> 120 sát thương bổ sung"),("zh-hans","你的镐将造成更多伤害。每次升级时伤害增加：30->40->60->80->120额外伤害"),("zh-Hant","你的鎬能造成更多傷害。每次升級時，造成的傷害提高：30 -> 40 -> 60 -> 80 -> 120 額外傷害")))
+TextReplacements=(Category=Game, Namespace="", Key="90E9D9084967B635DC3B04B7C8B46E1C", NativeString="Siphon some health and shields when you eliminate an opponent. Increases in power at each Level Up: 5 Healing -> 10 Healing -> 15 Healing -> 20 Healing -> 25 Healing per elimination", LocalizedStrings=(("ar","اسحب بعض الصحة والدروع عند إقصاء خصم. تزداد القوة عند رفع كل مستوى: 10 من الشفاء -> 15 من الشفاء -> 20 من الشفاء -> 25 من الشفاء -> 30 من الشفاء لكل تصفية"),("en","Siphon some health and shields when you eliminate an opponent. Increases in power at each Level Up: 10 Healing -> 15 Healing -> 20 Healing -> 25 Healing -> 30 Healing per elimination"),("de","Wenn du Gegner eliminierst, erhältst du ein wenig Kondition und Schilde. Die Wirkung erhöht sich mit jedem Levelaufstieg: 10 Heilung -> 15 Heilung -> 20 Heilung -> 25 Heilung -> 30 Heilung pro Eliminierung."),("es","Extrae algo de salud y escudo al eliminar a un oponente. A medida que sube de nivel, aumenta el poder por eliminación: 10 de curación -> 15 de curación -> 20 de curación -> 25 de curación -> 30 de curación."),("es-419","Otorga algo de vida y escudo al eliminar a un oponente. Aumenta el poder con cada subida de nivel: 10 -> 15 -> 20 -> 25 -> 30 de curación por eliminación."),("fr","L'effet sangsue permet de recevoir des PV et du bouclier en éliminant un adversaire. Augmente en puissance à chaque gain de niveau : 10 PV rendus -> 15 PV rendus -> 20 PV rendus -> 25 PV rendus -> 30 PV rendus par élimination"),("id","Mendapatkan sedikit HP dan perisai saat kamu menyingkirkan lawan. Meningkat dalam kekuatan tiap kali Naik Level: 10 Penyembuhan -> 15 Penyembuhan -> 20 Penyembuhan -> 25 Penyembuhan -> 30 Penyembuhan per eliminasi"),("it","Assorbi salute e scudi quando elimini un avversario. Acquisisci potere a ogni aumento di livello: 10 di cura -> 15 di cura -> 20 di cura -> 25 di cura -> 30 di cura a eliminazione"),("ja","敵を撃破すると、サイフォン効果で体力とシールドが回復する。レベルアップのたびに回復力アップ: 10ポイント -> 15ポイント -> 20ポイント -> 25ポイント -> 30ポイントを撃破時に回復可能だ"),("ko","다른 플레이어를 처치하면 체력과 보호막을 일정량 흡수합니다. 레벨이 오를 때마다 위력 증가: 처치당 치유량 10 -> 치유량 15 -> 치유량 20 -> 치유량 25 -> 치유량 30"),("pl","Zabierz odrobinę zdrowia i osłon po zlikwidowaniu przeciwnika. Zwiększa moc przy każdym awansie: 10 leczenia -> 15 leczenia -> 20 leczenia -> 25 leczenia -> 30 leczenia za likwidację"),("pt-BR","Sifone um pouco de vida e escudo ao eliminar oponentes. Aumenta o poder a cada Subida de Nível: 10 de Cura -> 15 de Cura -> 20 de Cura -> 25 de Cura -> 30 de Cura por Eliminação"),("ru","Вы восполняете немного здоровья и заряда щитов при устранении противника. С каждым новым уровнем количество поглощаемого здоровья при устранении возрастает: 10 ед. -> 15 ед. -> 20 ед. -> 25 ед. -> 30 ед."),("th","ดูดซับพลังชีวิตและเกราะบางส่วน เมื่อคุณกำจัดคู่ต่อสู้ การฮีลจะเพิ่มขึ้นทุกครั้งที่เลเวลอัป: 10 หน่วย -> 15 หน่วย -> 20 หน่วย -> 25 หน่วย -> 30 หน่วย ต่อการกำจัด"),("tr","Bir rakip avladığında can ve kalkan çalar. Seviye atladıkça gücü artar: Avlama başına 10 İyileştirme -> 15 İyileştirme -> 20 İyileştirme -> 25 İyileştirme -> 30 İyileştirme"),("vi","Hấp thụ một ít HP và khiên khi bạn hạ gục một đối thủ. Tăng sức mạnh sau mỗi lần Tăng Cấp: 10 Hồi Máu -> 15 Hồi Máu -> 20 Hồi Máu -> 25 Hồi Máu -> 30 Hồi Máu cho mỗi lượt hạ gục"),("zh-hans","淘汰对手时，虹吸恢复部分生命值和护盾。每次升级时效果提升：每次淘汰时恢复10点生命值->15点生命值->20点生命值->25点生命值->30点生命值"),("zh-Hant","淘汰對手時，汲取部分生命值和屏障力場。每次升級時能力提升：每次淘汰回復 10 點生命值 -> 回復 15 點生命值 -> 回復 20 點生命值 -> 回復 25 點生命值 -> 回復 30 點生命值")))
