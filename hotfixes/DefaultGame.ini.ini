+TextReplacements=(Category=Game, Namespace="", Key="C8605B514BB1E6F0BF9EE8823DFD5F79", NativeString="TBC", LocalizedStrings=(("ar","ملصقات هذه الحزمة مقتصرة على هيكل سيارة Chrysler Pacifica."),("en","Decals in this bundle are restricted to the Chrysler Pacifica car body."),("de","Die Aufkleber in diesem Paket sind auf die Karosserie „Chrysler Pacifica“ beschränkt."),("es","Las calcomanías de este lote solo están disponibles para la carrocería del Chrysler Pacifica."),("es-419","Las calcomanías de este lote solo están disponibles para la carrocería Chrysler Pacifica."),("fr","Les stickers de ce pack ne fonctionnent que sur le châssis Chrysler Pacifica."),("id","Stiker dalam bundel ini terbatas untuk bodi mobil Chrysler Pacifica."),("it","Gli adesivi di questo bundle sono limitati alla carrozzeria Chrysler Pacifica."),("ja","このバンドル内のデカールは、マシンのボディ「Chrysler Pacifica」に限定されています。"),("ko","이 번들의 데칼은 Chrysler Pacifica 차체에만 사용할 수 있습니다."),("pl","Wzory z tego zestawu można wykorzystać tylko w połączeniu z karoserią Chrysler Pacifica."),("pt-BR","Os Adesivos deste pacote são restritos ao Chassi Chrysler Pacifica."),("ru","Декали из этого комплекта совместимы только с кузовом Chrysler Pacifica."),("th","ลายแต่งในบันเดิลนี้จะจำกัดไว้เฉพาะกับตัวถังรถ Chrysler Pacifica เท่านั้น"),("tr","Bu paketteki çıkartmaları yalnızca Chrysler Pacifica araba gövdesiyle kullanabilirsin."),("vi","Hình dán trong bộ quà này dành riêng cho thân xe Chrysler Pacifica."),("zh-hans","此同捆包中的涂装仅可用于Chrysler Pacifica车体。"),("zh-Hant","此組合包的貼花僅限 Chrysler Pacifica 車身使用。")))
+TextReplacements=(Category=Game, Namespace="FortSettingValueDiscreteSupervised", Key="ClassInd_SETTING_DESCRIPTION", NativeString="Set the content rating for all devices using this account. Experiences rated higher than the selected rating will require PIN to be unlocked.\n\n<strong>12 years</>: The content has a light impact. Swearing, sexual language, injuries, blood fights and/or alcohol and cigarette consumption may appear.\n\n<strong>10 years</>: The content may have some impact, especially on young children. Light swearing, weapons, bloodless fights, horror scenes, references to alcohol and cigarettes and/or medicinal use of illicit drugs may appear.\n\n<strong>All ages</>: The content is suitable for all ages. May contain mild themes such as cartoon violence.\n\nLearn more about ratings: https://www.globalratings.com/ratings-guide-classind", LocalizedStrings=(("ar","عيّن تصنيف المحتوى لجميع الأجهزة باستخدام هذا الحساب. التجارب التي يتجاوز تصنيفها التصنيف المحدد ستتطلب إدخال رمز PIN لفتحها.\n\n<strong>16 سنة</>: للمحتوى تأثير معتدل. قد يظهر العنف الشديد والمتكرر والتشويه والتعذيب والعلاقات الجنسية و/أو تعاطي العقاقير غير المشروعة.\n\n<strong>14 سنة</>: للمحتوى تأثير معتدل. قد تظهر حالات الوفاة والإثارة الجنسية والعري و/أو التلميحات لتعاطي العقاقير غير المشروعة.\n\n<strong>12 سنة</>: المحتوى له تأثير طفيف. قد تظهر الشتائم و/أو اللغة الجنسية و/أو الإصابات و/أو القتال الدموي و/أو تناول الكحول والسجائر.\n\n<strong>10 سنوات</>: قد يكون للمحتوى بعض التأثير، خاصة على الأطفال الصغار. قد تظهر بعض الشتائم و/أو الأسلحة و/أو القتال غير الدموي و/أو مشاهد الرعب و/أو إشارات إلى الكحول والسجائر و/أو الاستخدام الطبي للعقاقير غير المشروعة.\n\n<strong>جميع الأعمار</>: المحتوى مناسب لجميع الأعمار. قد يحتوي على سمات معتدلة مثل العنف الرسومي.\n\nتعرف على المزيد عن التصنيفات: https://www.globalratings.com/ratings-guide-classind"),("en","Set the content rating for all devices using this account. Experiences rated higher than the selected rating will require PIN to be unlocked.\n\n<strong>16 years</> - The content has a moderate impact. Strong and frequent violence, mutilation, torture, sexual relations and/or use of illicit drugs may appear.\n\n<strong>14 years</> - The content has a moderate impact. Deaths, eroticization, nudity, and/or insinuations of the use of illicit drugs may appear.\n\n<strong>12 years</>: The content has a light impact. Swearing, sexual language, injuries, blood fights and/or alcohol and cigarette consumption may appear.\n\n<strong>10 years</>: The content may have some impact, especially on young children. Light swearing, weapons, bloodless fights, horror scenes, references to alcohol and cigarettes and/or medicinal use of illicit drugs may appear.\n\n<strong>All ages</>: The content is suitable for all ages. May contain mild themes such as cartoon violence.\n\nLearn more about ratings: https://www.globalratings.com/ratings-guide-classind"),("de","Legen Sie die Inhaltseinstufung für alle Geräte fest, die dieses Konto verwenden. Für Erlebnisse mit einer höheren Einstufung als die ausgewählte wird eine PIN zum Freischalten benötigt.\n\n<strong>16 Jahre</> – Die Inhalte haben eine mäßige Wirkung. Es können heftige und zahlreiche Gewaltdarstellungen, Verstümmelungen, Folter, sexuelle Handlungen und/oder der Konsum von illegalen Drogen vorkommen.\n\n<strong>14 Jahre</> – Die Inhalte haben eine mäßige Wirkung. Es können Todesfälle, Erotisierung, Nacktheit und/oder Andeutungen des Gebrauchs von illegalen Drogen vorkommen.\n\n<strong>12 Jahre</>: Die Inhalte haben leichte Wirkung. Es kann zu Kraftausdrücken, sexueller Sprache, Verletzungen, Kämpfen mit Blutdarstellungen und/oder Alkohol- und Zigarettenkonsum kommen.\n\n<strong>10 Jahre</>: Die Inhalte haben geringfügige Wirkung, insbesondere auf kleine Kinder. Milde Kraftausdrücke, Waffen, unblutige Kämpfe, Horrorszenen, Anspielungen auf Alkohol und Zigaretten und/oder den medizinischen Konsum illegaler Drogen können vorkommen.\n\n<strong>Alle Altersgruppen</>: Die Inhalte sind für alle Altersgruppen geeignet. Kann milde Themen wie Cartoon-Gewalt enthalten.\n\nErfahren Sie hier mehr über die Einstufungen: https://www.globalratings.com/ratings-guide-classind"),("es","Establece la calificación de contenido para todos los dispositivos en los que se utilice esta cuenta. Es necesario introducir la contraseña para desbloquear las experiencias con una calificación superior a la seleccionada.\n\n<strong>16 años</>. El contenido puede causar un impacto moderado. Puede incluir elementos como violencia intensa y frecuente, mutilaciones, torturas, relaciones sexuales o uso de sustancias ilegales.\n\n<strong>14 años</>. El contenido puede causar un impacto moderado. Puede incluir elementos como muertes, escenas eróticas, desnudez o insinuación del consumo de sustancias ilegales.\n\n<strong>12 años:</> el contenido tiene un impacto bajo. Puede incluir insultos, referencias o diálogos sexuales, representaciones de heridas, derramamiento de sangre y consumo de alcohol y tabaco.\n\n<strong>10 años:</> contenido que puede tener cierto efecto, especialmente en niños pequeños. Puede incluir insultos ligeramente ofensivos, armas, luchas incruentas, escenas de miedo, referencias a tabaco y alcohol, y el uso médico de drogas ilegales.\n\n<strong>Todas las edades:</> el contenido es adecuado para niños de todas las edades. Puede incluir contenido con un impacto muy reducido, como, por ejemplo, violencia en los dibujos animados.\n\nMás información sobre las calificaciones en https://www.globalratings.com/ratings-guide-classind"),("es-419","Establece la clasificación de contenido para todos los dispositivos que usan esta cuenta. Se requerirá un PIN para desbloquear las experiencias con una clasificación más alta que la seleccionada.\n\n<strong>16 años</>: El contenido tiene un impacto moderado. Pueden aparecer situaciones violentas fuertes y frecuentes, mutilaciones, torturas, relaciones sexuales o uso de drogas ilícitas.\n\n<strong>14 años</>: El contenido tiene un impacto moderado. Pueden aparecer muertes, erotismo, desnudos o insinuaciones del uso de drogas ilícitas.\n\n<strong>12 años</>: El contenido tiene un impacto leve. Puede incluir groserías, lenguaje sexual, lesiones, peleas con sangre o consumo de alcohol y cigarrillos.\n\n<strong>10 años</>: El contenido tiene cierto impacto, especialmente para niños pequeños. Puede incluir groserías leves, armas, peleas sin sangre, escenas de terror, referencias a alcohol y cigarrillos o el uso medicinal de drogas ilícitas.\n\n<strong>Todas las edades</>: El contenido es adecuado para todas las edades. Puede contener temas de impacto leve como violencia de caricatura.\n\nMás información sobre las clasificaciones: https://www.globalratings.com/ratings-guide-classind"),("fr","Définissez la classification des contenus pour tous les appareils en utilisant ce compte. Les expériences dont la classification est supérieure à celle sélectionnée devront être déverrouillées par un code PIN.\n\n<strong>16 ans</> : le contenu a un impact modéré. Présence potentielle de violence forte et fréquente, de mutilation, de torture, de relations sexuelles ou de consommation de stupéfiants.\n\n<strong>14 ans</> : le contenu a un impact modéré. Présence potentielle de mort, d'érotisme, de nudité ou de consommation insinuée de stupéfiants.\n\n<strong>12 ans</> : le contenu a un impact léger. Des jurons, allusions sexuelles, blessures, combats avec représentation de sang et/ou usages d'alcool et de cigarettes peuvent être présents.\n\n<strong>10 ans</> : le contenu peut avoir un impact léger, surtout sur les plus jeunes enfants. Des jurons, armes, combats sans représentation de sang, scènes d'horreur, références à l'alcool, aux cigarettes et/ou l'usage de drogues peuvent être présents, mais sous une forme édulcorée.\n\n<strong>Tous les âges</> : le contenu est adapté à tous les âges. Peut contenir des éléments bénins tels que de la violence non réaliste.\n\nPour en savoir plus sur les classifications, consultez : https://www.globalratings.com/ratings-guide-classind"),("id","Atur rating konten untuk semua perangkat yang menggunakan akun ini. Pengalaman dengan rating yang lebih tinggi dari rating yang dipilih akan memerlukan PIN untuk dibuka.\n\n<strong>16 tahun</> - Konten memiliki dampak yang sedang. Kekerasan yang parah dan sering, mutilasi, penyiksaan, hubungan seksual dan/atau penggunaan narkoba ilegal mungkin muncul.\n\n<strong>14 tahun</> - Konten memiliki dampak yang sedang. Kematian, keerotisan, ketelanjangan, dan/atau sindiran tentang penggunaan obat-obatan terlarang mungkin muncul.\n\n<strong>12 tahun</>: Konten memiliki dampak ringan. Sumpah serapah, bahasa seksual, luka, perkelahian berdarah, dan/atau konsumsi alkohol serta rokok mungkin muncul.\n\n<strong>10 tahun</>: Konten mungkin memiliki beberapa dampak, terutama pada anak kecil. Sumpah serapah ringan, senjata, perkelahian tanpa darah, adegan horor, referensi alkohol dan rokok, dan/atau penggunaan obat terlarang untuk tujuan pengobatan mungkin muncul.\n\n<strong>Semua usia</>: Konten cocok untuk semua umur. Mungkin mengandung tema ringan seperti kekerasan kartun.\n\nPelajari lebih lanjut tentang rating: https://www.globalratings.com/ratings-guide-classind"),("it","Imposta la classificazione dei contenuti per tutti i dispositivi che usano questo account. Per sbloccare le esperienze con una classificazione più alta di quella selezionata sarà necessario un PIN.\n\n<strong>16 anni</> I contenuti hanno un impatto moderato. Potrebbero essere presenti violenza forte e frequente, mutilazione, tortura, rapporti sessuali e/o uso di droghe illecite.\n\n<strong>14 anni</> I contenuti hanno un impatto moderato. Possono apparire morti, erotizzazione, nudità e/o allusioni all'uso di droghe illecite.\n\n<strong>12 anni</>: il contenuto ha un lieve impatto. Può contenere turpiloquio, linguaggio sessuale, ferite, lotte con sangue e/o consumo di alcool e sigarette.\n\n<strong>10 anni</>: il contenuto può avere un certo impatto, soprattutto sui bambini più piccoli. Può contenere turpiloquio moderato, armi, lotte senza sangue, scene di orrore, riferimenti ad alcool e sigarette e/o all'uso medicinale di droghe illecite.\n\n<strong>Tutte le età</>: il contenuto è adatto a tutte le età. Può contenere temi leggeri, come violenza comica o da cartone animato.\n\nScopri di più sulle classificazioni: https://www.globalratings.com/ratings-guide-classind"),("ja","このアカウントを使用する全デバイスにおけるコンテンツの年齢評価を設定します。選択した年齢評価よりも上の年齢評価が付けられた体験は、暗証番号によるロックの解除が必要になります。\n\n<strong>16歳</>: コンテンツによる影響は中程度です。激しく頻繁な暴力表現、人体の切断 、拷問、性的描写、および/または違法薬物の使用の描写が含まれる場合があります。\n\n<strong>14歳</>: コンテンツによる影響は中程度です。死、性的描写、ヌード、および/または違法薬物の使用の描写が含まれる場合があります。\n\n<strong>12歳</>: コンテンツによる影響は軽度です。汚い言葉、性的な言葉、怪我、流血を伴う戦い、および/またはアルコールとタバコの使用の描写が含まれる場合があります。\n\n<strong>10歳</>: 特に幼い子どもに対し、少し影響を及ぼす可能性があります。軽度な汚い言葉、武器、流血を伴わない戦い、怖いシーン、アルコールとタバコへの言及、および/または医薬用途による違法薬物の使用が含まれる場合があります。\n\n<strong>全年齢対象</>: 全年齢に適した内容です。漫画的な暴力など、軽度なテーマが含まれる場合があります。\n\n年齢評価の詳細はこちら: https://www.globalratings.com/ratings-guide-classind"),("ko","이 계정을 사용하는 모든 기기에 대해 콘텐츠 이용등급을 설정합니다. 선택한 이용등급보다 높은 콘텐츠를 이용하려면 PIN을 입력해야 합니다.\n\n<strong>만 16세</>: 다소 자극적이거나 영향을 줄 수 있는 콘텐츠입니다. 강하고 빈번한 폭력, 신체 훼손, 고문, 성관계, 불법 약물 사용 장면이 포함될 수 있습니다.\n\n<strong>만 14세</>: 다소 자극적이거나 영향을 줄 수 있는 콘텐츠입니다. 죽음, 성적 표현, 노출 및/또는 불법 약물 사용을 암시하는 내용이 포함될 수 있습니다.\n\n<strong>만 12세</>: 경미한 영향을 줄 수 있는 콘텐츠입니다. 욕설, 성적 표현, 부상, 유혈이 있는 싸움, 음주 및 흡연 장면이 포함될 수 있습니다.\n\n<strong>만 10세</>: 특히 아동에게 일부 영향을 줄 수 있는 콘텐츠입니다. 가벼운 욕설, 무기, 유혈이 없는 싸움, 공포 장면, 음주·흡연 언급, 불법 약물의 의료적 사용 장면이 포함될 수 있습니다.\n\n<strong>전 연령</>: 모든 연령층에 적합한 콘텐츠입니다. 만화풍 폭력 등 경미한 표현이 포함될 수 있습니다.\n\n이용등급 자세히 보기: https://www.globalratings.com/ratings-guide-classind"),("pl","Ustaw klasyfikację treści dla wszystkich urządzeń używających tego konta. Przygody mające klasyfikację wyższą niż wybrana, będą wymagać PIN-u do odblokowania.\n\n<strong>16 lat</> Treści dla osób w wieku od 16 lat o umiarkowanym wpływie na widza. Mocne i częste sceny przemocy oraz sceny ukazujące okaleczanie, tortury, czynności seksualne i/lub zażywanie nielegalnych substancji (narkotyków).\n\n<strong>14 lat</> Treści dla osób w wieku od 14 lat o umiarkowanym wpływie na widza. Dozwolone są sceny śmierci, motywy o zabarwieniu erotycznym, nagość i/lub odniesienia do zażywania nielegalnych substancji (narkotyków).\n\n<strong>12 lat</>: Treści mają niewielki wpływ. Mogą pojawić się przekleństwa, język seksualny, krwawe walki i/lub spożycie alkoholu i papierosów.\n\n<strong>10 lat</>: Treści mogą mieć pewien wpływ, zwłaszcza na małe dzieci. Mogą pojawić się lekkie przekleństwa, broń, bezkrwawe walki, sceny horroru, odniesienia do alkoholu i papierosów i/lub medycznego zastosowania nielegalnych narkotyków.\n\n<strong>Wszystkie grupy wiekowe</>: Treści są odpowiednie dla wszystkich grup wiekowych. Mogą zawierać łagodne motywy, jak fantastyczna przemoc.\n\nWięcej informacji o klasyfikacjach: https://www.globalratings.com/ratings-guide-classind"),("pt-BR","Defina a classificação de conteúdo para todos os dispositivos usando esta conta. Experiências com classificação de conteúdo acima da classificação selecionada exigirão PIN para desbloqueio.\n\n<strong>16 anos</>: O conteúdo tem um impacto moderado. Pode haver violência forte e frequente, mutilação, tortura, relações sexuais e/ou uso de drogas ilícitas.\n\n<strong>14 anos</>: O conteúdo tem um impacto moderado. Pode haver mortes, erotização, nudez e/ou insinuações do uso de drogas ilícitas.\n\n<strong>12 anos</>: O conteúdo tem impacto leve. Possível presença de linguagem vulgar, sexual, ferimentos, lutas com sangue e/ou bebidas alcoólicas e consumo de cigarro.\n\n<strong>10 anos</>: O conteúdo pode ter certo impacto, principalmente em crianças mais novas. Possível presença de linguagem vulgar leve, armas, lutas sem sangue, cenas de horror, referências a bebidas alcoólicas e cigarros, e/ou uso medicinal de drogas ilícitas.\n\n<strong>Livre</>: O conteúdo é apropriado para todas as idades. Pode conter temas leves, como violência animada.\n\nConfira mais informações sobre classificações: https://www.globalratings.com/ratings-guide-classind"),("ru","Выберите возрастное ограничение для контента, которое будет действовать на всех устройствах, использующих эту учётную запись. Чтобы разблокировать материалы, рейтинг которых выходит за рамки ограничений, понадобится ввести PIN-код.\n\n<strong>Старше 16 лет</>. Контент может оказывать умеренное влияние. Могут присутствовать такие элементы, как сильное и частое проявления насилия, нанесение увечий, пытки, сексуальные отношения и/или использование запрещённых препаратов.\n\n<strong>Старше 14 лет</>. Контент может оказывать умеренное влияние. Могут присутствовать такие элементы, как смерть или гибель, придание эротичности, нагота и/или намёки на использование запрещённых препаратов.\n\n<strong>12 лет</>: материалы со слабым воздействием на психику. Допускаются бранные выражения, сексуальный подтекст, изображения травм и кровавые сцены, а также сцены курения табака и употребления алкоголя.\n\n<strong>10 лет</>: материалы способны оказать слабое влияние на психику маленьких детей. Допускаются умеренные бранные выражения, изображения оружия и драк без кровопролития, пугающие сцены, упоминание табака, алкоголя и/или запрещённых веществ, использующихся в лечебных целях.\n\n<strong>Для всех</>: материалы подходят игрокам всех возрастов. Допускаются умеренные темы вроде мультипликационного насилия.\n\nПодробнее о возрастных рейтингах: https://www.globalratings.com/ratings-guide-classind"),("th","ตั้งค่าการจัดอันดับเนื้อหาให้กับอุปกรณ์ทั้งหมดที่ใช้บัญชีนี้ ประสบการณ์การรับชมเนื้อหาที่ได้รับการจัดอันดับที่สูงกว่าระดับการจัดอันดับที่เลือกนั้น จำเป็นต้องใช้รหัส PIN เพื่อปลดล็อก\n\n<strong>16 ปี</> - เนื้อหาอาจมีผลกระทบปานกลาง อาจมีการใช้ความรุนแรง ฆ่าฟันให้พิการ การทรมาน ความสัมพันธ์ทางเพศ และ/หรือการใช้ยาเสพติดอย่างรุนแรงและบ่อยครั้ง\n\n<strong>14 ปี</> - เนื้อหาอาจมีผลกระทบปานกลาง อาจมีภาพของการเสียชีวิต การเร้าอารมณ์ทางเพศ ภาพโป๊เปลือย และ/หรือการบอกเป็นนัยถึงการใช้ยาเสพติด\n\n<strong>12 ปี</>: เนื้อหามีผลกระทบเล็กน้อย อาจมีคำหยาบคาย ภาษาที่เกี่ยวกับเรื่องเพศ การบาดเจ็บ การต่อสู้จนเลือดตกยางออกและ/หรือแสดงภาพของเครื่องดื่มแอลกอฮอล์และบุหรี่\n\n<strong>10 ปี</>: เนื้อหาอาจมีผลกระทบบ้าง โดยเฉพาะอย่างยิ่งกับเด็กเล็ก อาจมีคำหยาบคายเล็กน้อย อาวุธ การต่อสู้แบบไม่นองเลือด ฉากสยองขวัญ การอ้างอิงถึงแอลกอฮอล์และบุหรี่และ/หรือแสดงภาพการใช้ยาเสพติดเพื่อการรักษา\n\n<strong>ทุกวัย</>: เนื้อหานี้เหมาะสำหรับผู้ชมทุกวัย อาจมีเนื้อหาที่ไม่รุนแรง เช่น ความรุนแรงในระดับการ์ตูน\n\nโปรดดูข้อมูลเพิ่มเติมเกี่ยวกับการจัดเรตได้ที่: https://www.globalratings.com/ratings-guide-classind"),("tr","Bu hesabı kullanan tüm cihazlar için içerik derecelendirmesini belirle. Seçili derecelendirmeden daha yüksek bir derecelendirmeye sahip deneyimlerin açılması için PIN kodu gerekir.\n\n<strong>16 yaş ve üstü</>: İçeriğin etkisi orta seviyededir. Güçlü ve sık sık görülen şiddet, uzuv kesilmesi, işkence, cinsel ilişkiler ve/veya yasa dışı uyuşturucuların kullanımı ile karşılaşılabilir.\n\n<strong>14 yaş ve üstü</>: İçeriğin etkisi orta seviyededir. Ölüm, erotikleştirme, çıplaklık ve/veya yasa dışı uyuşturucuların kullanımına dair imalar ile karşılaşılabilir.\n\n<strong>12 yaş ve üstü</>: İçerik hafif şiddetlidir. Küfür, cinsel içerikli sözler, yaralanmalar, kanlı savaşlar veya alkol ve sigara tüketimi görülebilir.\n\n<strong>10 yaş ve üstü</>: İçerik, özellikle küçük çocuklar üzerinde biraz etki bırakabilir. Hafif küfürler, silahlar, kansız savaşlar, korku sahneleri içerebilir ve sigara ve alkol ya da yasadışı madde kullanımının bahsi geçebilir.\n\n<strong>Tüm yaşlar</>: İçerik, tüm yaşlar için uygundur. Çizgi film şiddeti gibi hafif temalar içerebilir.\n\nDerecelendirme hakkında daha fazla bilgi için: https://www.globalratings.com/ratings-guide-classind"),("vi","Thiết lập xếp hạng nội dung cho mọi thiết bị sử dụng tài khoản này. Trải nghiệm có xếp hạng vượt quá mức xếp hạng đã chọn sẽ cần dùng mã PIN để mở khóa.\n\n<strong>16 tuổi</> - Nội dung có tác động ở mức trung bình. Có thể xuất hiện bạo lực mạnh mẽ và thường xuyên, gây thương tích, tra tấn, quan hệ tình dục và/hoặc sử dụng ma túy bất hợp pháp.\n\n<strong>14 tuổi</> - Nội dung có tác động ở mức trung bình. Có thể xuất hiện cảnh tử vong, khiêu dâm, khỏa thân và/hoặc ám chỉ việc sử dụng ma túy bất hợp pháp.\n\n<strong>12 tuổi</>: Nội dung có tác động nhẹ. Có thể xuất hiện cảnh chửi thề, ngôn ngữ tình dục, thương tích, đánh đấm máu me và/hoặc sử dụng rượu bia và thuốc lá.\n\n<strong>10 tuổi</>: Nội dung có thể gây một số tác động, đặc biệt đối với trẻ nhỏ. Có thể xuất hiện cảnh chửi thề mức độ nhẹ, vũ khí, đánh đấm không đổ máu, cảnh kinh dị, liên hệ đến rượu bia và thuốc lá và/hoặc sử dụng chất cấm cho mục đích y tế.\n\n<strong>Mọi độ tuổi</>: Nội dung phù hợp cho mọi độ tuổi. Có thể chứa chủ đề gây tác động nhẹ như bạo lực dưới hình thức hoạt hình.\n\nTìm hiểu thêm về xếp hạng: https://www.globalratings.com/ratings-guide-classind"),("zh-hans","为使用该账户的所有设备设置内容评级。高于所选评级的内容需要标识码才可解锁。\n\n<strong>16 岁</>：内容可造成中等程度的影响。 可能会出现强烈和频繁的暴力、致残、折磨、性关系和/或使用非法药物。\n\n<strong>14 岁</>：内容可造成中等程度的影响。 可能会出现死亡、色情、裸体和/或暗示使用非法药物的情况。\n\n<strong>12岁</>：内容影响较轻。可能出现粗俗用语、性语言、受伤、流血冲突和/或酗酒抽烟等内容。\n\n<strong>10岁</>：内容可能会对幼儿产生一定影响。可能会出现轻微的粗俗用语、武器、无血腥打斗、恐怖场景、提及酒精和香烟和/或非违禁药物的医疗使用。\n\n<strong>所有年龄人群</>：内容适合所有年龄段。可能包含温和的主题，比如卡通暴力。\n\n了解更多评级信息：https://www.globalratings.com/ratings-guide-classind"),("zh-Hant","設定此帳號在所有裝置上使用的內容分級。高於所選分級的體驗將需要 PIN 碼才能解鎖。\n\n<strong>16 歲</> 內容會造成中度影響。 其中可能出現強烈與頻繁的暴力、肢體殘害、虐待、性關係以及使用違禁藥物等情境。\n\n<strong>14 歲</> 內容會造成中度影響。 其中可能出現死亡、色情、裸露或影射使用違禁藥物等情境。\n\n<strong>12 歲</>：內容影響力輕微。可能出現咒罵、性暗示語言、傷害、流血打鬥及/或飲酒與吸菸。\n\n<strong>10 歲</>：內容可能對年幼兒童產生一些影響。可能出現輕度咒罵、武器、無血打鬥、恐怖場景、提及酒精與香菸及/或違禁藥物的醫療用途。\n\n<strong>所有年齡</>：內容適合所有年齡。可能包含如卡通暴力的輕度主題。\n\n進一步了解分級資訊：https://www.globalratings.com/ratings-guide-classind")))
