+TextReplacements=(Category=Game, Namespace="", Key="1D1BE67A447F97C0914661842F2E41B4", NativeString="The Ninja at the Monastery of Spinjitzu have stabilized a Portal for you to the heart of the Land of Monsters. Travel through it to find the Shatter Spawn!", LocalizedStrings=(("ar","يعمل النينجا في معقِل سبينجيتسو على جعل <empha> البوابة إلى أرض الوحوش</> مستقرة. عند تنشيطها، سافر عبرها وواجه نسل المدمّر!"),("en","The Ninja at the Monastery of Spinjitzu are working to stabilize a <empha> Portal into the Land of Monsters</>. When it's activated, travel through it and face off against Shatter Spawn!"),("de","Im Spinjitzu-Kloster arbeiten die Ninjas daran, ein <empha>Portal ins Land der Monster</> zu stabilisieren. Wenn es aktiviert wird, kannst du direkt dadurch reisen und dich der Zerstörerbrut stellen!"),("es","Los ninjas del monasterio del Spinjitzu están trabajando para estabilizar un <empha>portal hacia la Tierra de los Monstruos</>. Cuando se active, ¡atraviésalo y enfréntate a la criatura del caos!"),("es-419","Los ninjas del Monasterio del Spinjitzu están trabajando para estabilizar un <empha>portal a la Tierra de los Monstruos</>. Cuando se active, atraviésalo y enfréntate a la criatura del caos."),("fr","Les ninjas du monastère du Spinjitzu s'efforcent de stabiliser un <empha>portail vers la Terre des Monstres</>. Une fois celui-ci activé, franchissez-le et affrontez un Invocateur du chaos !"),("id","Para Ninja di Biara Spinjitzu sedang berupaya menstabilkan <empha> Portal menuju Tanah Para Monster</>. Saat diaktifkan, masuklah ke sana dan hadapi Spawn Shatter!"),("it","I ninja al Monastero di Spinjitzu stanno lavorando per stabilizzare un <empha>portale verso la Terra dei Mostri</>. Quando sarà attivato, attraversalo e affronta la Progenie della distruzione!"),("ja","スピン術道場のニンジャたちが、<empha>モンスターの国へのポータル</>を安定化させている。起動したら、ポータルをくぐってシャッター・ドラゴンと戦おう！"),("ko","스핀짓주 사원의 닌자들이 <empha>몬스터의 땅으로 가는 차원문</>을 안정화하고 있습니다. 활성화되면 차원문을 통해 이동해 섀터 드래곤과 맞서 싸우세요!"),("pl","Ninjowie z Klasztoru Spinjitzu pracują nad ustabilizowaniem <empha> portalu do Krainy Potworów.</> Kiedy się aktywuje, przejdź przez niego i zmierz się z Pomiotem Rozłamu!"),("pt-BR","Ninjas do Mosteiro de Spinjitzu estão trabalhando para estabilizar um <empha>Portal até a Terra dos Monstros</>. Quando for ativado, atravesse-o e enfrente a Ninhada do Destruidor!"),("ru","Ниндзя из монастыря кружитцу пытаются стабилизировать <empha>портал в Мир монстров</>. Как только он откроется, войдите в него, чтобы сразиться с Порождением пустоты!"),("th","เหล่านินจาที่อารามสปินจิตสึกำลังพยายามรักษาความเสถียรของ<empha>ประตูมิติสู่พิภพอสูร</> เมื่อเปิดใช้งานแล้ว เดินทางผ่านประตูมิติไปและเผชิญหน้ากับมังกรแห่งความพินาศ!"),("tr","Spinjitzu Manastırı'ndaki Ninjalar, Canavarlar Ülkesi'ne giden bir <empha>Portalı</> stabil hale getirmeye çalışıyor. Etkinleştirildiğinde, içinden geç ve Parçalayan Minyonlarla yüzleş!"),("vi","Các Ninja tại Tu Viện Thuật Xoáy Lốc đang nỗ lực ổn định một <empha>Cổng Dịch Chuyển vào Cõi Quái Vật</>. Khi nó được kích hoạt, hãy di chuyển qua đó và đối đầu với Chấn Long!"),("zh-hans","幻影旋转术道场的忍者正在努力稳定一道<empha>通往魔兽绝地的传送门</>。传送门被激活时，穿过它并对抗破碎后裔！"),("zh-Hant","旋風忍術修道院的忍者正努力穩定住通往<empha>怪物之境的傳送門</>。等它啟動後，就穿越過去，迎戰爆碎龍吧！")))
+TextReplacements=(Category=Game, Namespace="", Key="F243E0114B4038934BA1B18D7AE6A40A", NativeString="Find your way to the Shatter Sanctum and take one down! Jay, Zane, and Cole can be summoned through their own Portals once you enter the Shatter Spawn’s arena!", LocalizedStrings=(("ar","بمجرد تنشيط <empha>البوابة في معقِل سبينجيتسو</>، اعثر على طريقك إلى ملاذ المدمّر واقضِ على نسل مدمّر! يمكن استدعاء جاي وزين وكول عبر بواباتهم الخاصة بمجرد دخولك ساحة نسل المدمّر!"),("en","Once the <empha>Portal at the Monastery of Spinjitzu</> is active, find your way to the Shatter Sanctum and take down a Shatter Spawn! Jay, Zane, and Cole can be summoned through their own Portals once you enter the Shatter Spawn’s arena!"),("de","Sobald das <empha>Portal im Spinjitzu-Kloster</> aktiv ist, solltest du zum Heiligtum der Zerstörung gehen und eine Zerstörerbrut erledigen! Jay, Zane und Cole können durch ein jeweils eigenes Portal dorthin gerufen werden, sobald du die Arena der Zerstörerbrut betreten hast!"),("es","Cuando el <empha>portal del monasterio del Spinjitzu</> esté activo, encuentra el camino hasta el Santuario Siniestrado y acaba con una criatura del caos. ¡Puedes invocar a Jay, Zane y Cole con sus propios portales tras entrar en la arena de la criatura del caos!"),("es-419","Una vez que el <empha>portal en el Monasterio de Spinjitzu</> esté activo, ¡encuentra el camino al Santuario del caos y derrota a una criatura del caos! ¡Puedes invocar a Jay, Zane y Cole a través de sus propios portales una vez que entres a la arena de la criatura del caos!"),("fr","Une fois que le <empha>portail du monastère du Spinjitzu</> est activé, rendez-vous au Sanctuaire chaotique et terrassez un Invocateur du chaos ! Jay, Zane et Cole peuvent être invoqués via leurs portails une fois dans l'arène de l'Invocateur du chaos !"),("id","Begitu <empha>Portal di Biara Spinjitzu</> aktif, temukan jalanmu menuju Sanctum Shatter dan kalahkan Spawn Shatter! Jay, Zane, dan Cole bisa dipanggil melalui Portal mereka sendiri begitu kamu memasuki arena Spawn Shatter!"),("it","Non appena il <empha>portale al Monastero di Spinjitzu</> è attivo, dirigiti al Sacrario della Distruzione e sconfiggi una Progenie della distruzione! Jay, Zane e Cole possono essere evocati attraverso i loro portali una volta che entri nell'arena!"),("ja","<empha>スピン術道場のポータル</>が起動すると、シャッターの聖域に入り、シャッター・ドラゴンを倒しにいけるようになるぞ！シャッター・ドラゴンのアリーナに入ると、ジェイ、ゼン、コールをそれぞれのポータルから召喚できる！"),("ko","<empha>스핀짓주 사원의 차원문</>이 활성화되면, 섀터 성소로 가서 섀터 드래곤을 쓰러트리세요! 섀터 드래곤의 아레나에 들어가면 제이, 쟌, 콜을 각자의 차원문을 통해 소환할 수 있습니다!"),("pl","Gdy <empha> portal w Klasztorze Spinjitzu</> będzie aktywny, przedostań się do Sanktuarium Rozłamu i pokonaj Pomiot Rozłamu! Gdy wejdziesz na arenę Pomiotu Rozłamu, możesz przywołać Jaya, Zane’a i Cole’a przez ich własne portale!"),("pt-BR","Assim que o <empha>Portal no Mosteiro de Spinjitzu</> estiver ativo, encontre o caminho até o Santuário do Destruidor e derrote um membro da Ninhada do Destruidor! Jay, Zane e Cole podem ser invocados pelos seus próprios Portais assim que você entrar na arena da Ninhada do Destruidor!"),("ru","Как только <empha>в монастыре кружитцу откроется портал</>, отправьтесь в Храм пустоты, чтобы уничтожить Порождение пустоты! Джея, Зейна и Коула можно призвать через их порталы на арене Порождений пустоты."),("th","เมื่อ <empha>ประตูมิติที่อารามแห่งสปินจิตสึ</>เปิดใช้งาน หาทางไปยังวิหารแห่งความพินาศแล้วจัดการมังกรแห่งความพินาศซะ! เมื่อเข้าไปในสนามประลองของมังกรแห่งความพินาศ คุณสามารถอัญเชิญเจย์ เซน และโคลผ่านประตูมิติของพวกเขาได้!"),("tr","<empha>Spinjitzu Manastırı'ndaki Portal</> etkinleştiğinde, Parçalama Tapınağı'na git ve bir Parçalayan Minyon'u alt et! Parçalayan Minyonların arenasına girdikten sonra Jay, Zane ve Cole'u kendi Portallarından çağırabilirsin!"),("vi","Khi <empha>Cổng Dịch Chuyển tại Tu Viện Thuật Xoáy Lốc</> được kích hoạt, hãy tìm đường đến Thánh Điện Chấn Long và hạ gục một con Chấn Long! Jay, Zane và Cole có thể được triệu hồi thông qua Cổng Dịch Chuyển của riêng họ sau khi bạn tiến vào đấu trường của Chấn Long!"),("zh-hans","<empha>幻影旋转术道场的传送门</>激活后，找到前往破碎圣所的路，并干掉一个破碎后裔！一旦你进入破碎后裔的竞技场，就可以通过杰、赞和寇各自的传送门召唤他们！"),("zh-Hant","當<empha>旋風忍術修道院的傳送門</>啟動後，就前往破碎聖所，擊倒一隻爆碎龍！當你進入爆碎龍的競技場後，就能透過各自的傳送門召喚阿光、冰忍和阿剛！")))
