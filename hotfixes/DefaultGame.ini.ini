+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="C68C9C9641FE1D3515683CA22937622F", NativeString="Choose a <Orange>Defender</> and select <Orange>Confirm</> to add them to the <Orange>Lead Defender</> slot.", LocalizedStrings=(("id","Pilih <Orange>Pembela</> dan klik <Orange>Konfirmasi</> untuk menambahkannya ke slot <Orange>Pembela Utama</>.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="12EEF50F45D38D10D892248BEDF73FB8", NativeString="The number of <Orange>Defenders</> that show up in a <Orange>Mission</> is based on how many <Orange>Teammates</> you have. Solo players can bring up to three <Orange>Defenders</> into a Mission. If you are in a party only your <Orange>Lead Defender</> will show up in Missions.", LocalizedStrings=(("id","Jumlah <Orange>Pembela</> yang muncul dalam <Orange>Misi</> ditentukan oleh jumlah <Orange>Rekan Tim</> yang kamu punya. Pemain solo bisa membawa hingga tiga <Orange>Pembela</> ke Misi. Kalau kamu berada dalam kelompok, hanya <Orange>Pembela Utama</> yang akan muncul dalam Misi.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="238451584F76A61650010194ACDCE031", NativeString="Select <Orange>Add Lead Defender</> to equip a <Orange>Lead Defender</> to this <Orange>Hero Loadout</>.", LocalizedStrings=(("id","Pilih <Orange>Tambahkan Pembela Utama</> untuk memasang satu <Orange>Pembela Utama</> ke <Orange>Set Tempur Hero</> ini.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="D5C7F13C46F8819798D1E9B3D539DAE5", NativeString="This is your <Orange>Lead Defender Slot</>. You will unlock two more <Orange>Defender Slots</> as you progress through the main Campaign.", LocalizedStrings=(("id","Ini adalah <Orange>Slot Pembela Utama</> milikmu. Kamu akan membuka dua <Orange>Slot Pembela</> lagi seiring progresmu dalam Kampanye utama.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="9A0FC360464A8907A4E68BB94DEBB9EC", NativeString="These are all your available <Orange>Defenders</>. There are five <Orange>Defender Types</>. Each <Orange>Defender Type</> comes armed with their own personal weapon and an endless stockpile of ammo to back it up!", LocalizedStrings=(("id","Ini semua adalah <Orange>Pembela</> yang tersedia. Ada lima <Orange>Tipe Pembela</>. Setiap <Orange>Tipe Pembela</> memiliki senjata pribadi dan persediaan amunisi tanpa batas untuk melengkapinya!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="6D3D4BEC433D7F66ED7DF0934AF2E879", NativeString="Your <Orange>Defenders</> can also be manually leveled up using <Orange>People XP</>. Select <Orange>Back</> and I will run you through the process.", LocalizedStrings=(("id","Level <Orange>Pembela</> juga bisa dinaikkan secara manual menggunakan <Orange>XP Pengguna</>. Pilih <Orange>Kembali</> dan aku akan memandu prosesnya.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="4A055C94411109015BDA0AAB45F68194", NativeString="Now select <Orange>Defenders</>.", LocalizedStrings=(("id","Sekarang pilih <Orange>Pembela</>.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="CB830EF74CDA7C55EFFDD6A901956838", NativeString="Choose an available <Orange>Defender</> and select <Orange>Upgrade</> / <Orange>Inspect</>.", LocalizedStrings=(("id","Pilih <Orange>Pembela</> yang tersedia dan pilih <Orange>Upgrade</>/<Orange>Periksa</>.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="AD26ED9044E4A1ADB49C39A93D38A321", NativeString="As you level up a <Orange>Defender</>, their weapon will become more powerful and the <Orange>Defender</> will also gain <Orange>Perks</>.", LocalizedStrings=(("id","Saat kamu menaikkan level <Orange>Pembela</>, senjata miliknya akan menjadi lebih kuat dan <Orange>Pembela</> juga akan mendapatkan <Orange>Keuntungan</>.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="9ABFE6F34AA33EB715D3E58B14B5B5EC", NativeString="And that's the basics on <Orange>Defenders</>.", LocalizedStrings=(("id","Dan itu adalah hal dasar tentang <Orange>Pembela</>.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="F2DB44CE41C878E04EE2C0831C5F99DC", NativeString="Move extra heroes, defenders, survivors, and schematics to your <Orange>collection book</> to earn <Orange>collection book XP</>. <Orange>Level up</> your <Orange>collection book</> to earn rewards.", LocalizedStrings=(("id","Pindahkan hero, pembela, penyintas, dan skema tambahan ke <Orange>buku koleksi</> untuk mendapatkan <Orange>XP buku koleksi</>. <Orange>Naikkan level</> <Orange>buku koleksi</> kamu untuk mendapatkan imbalan.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="1630D7C740D3338959FBA08E5239FAF9", NativeString="Now you can also <Orange>recycle</> schematics and <Orange>retire</> heroes, survivors, and defenders.", LocalizedStrings=(("id","Sekarang, kamu juga bisa <Orange>mendaur ulang</> skema dan <Orange>memberhentikan</> hero, penyintas, dan pembela.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="15FC3B114C41DCEA5D50B1B92EBE4339", NativeString="From here, you can slot <Orange>Heroes</>, <Orange>Defenders</>, <Orange>Survivors</>, and <Orange>Schematics</>, This will earn <Orange>Collection Book XP</> toward special rewards.", LocalizedStrings=(("id","Dari sini, kamu bisa menempatkan <Orange>Hero</>, <Orange>Pembela</>, <Orange>Penyintas</>, dan <Orange>Skema</> di slot yang ada. Ini akan menghasilkan <Orange>XP Buku Koleksi</> yang berguna untuk mendapatkan imbalan spesial.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="74F6A49949F03735E75B95B96728EA96", NativeString="One last thing. We have been automatically applying your earned <Orange>People XP</> to your equipped <Orange>Heroes</>, <Orange>Defenders</>, and <Orange>Survivors</> up until now. If you prefer a more hands-on approach and you only want to level up your <Orange>Heroes</>, <Orange>Defenders</> and <Orange>Survivors</> manually, you can turn off the <Orange>Automatically Apply People XP</> feature in the <Orange>Settings</> menu.", LocalizedStrings=(("id","Satu hal terakhir. Hingga saat ini, kami telah secara otomatis menerapkan <Orange>XP Pengguna</> yang kamu peroleh ke <Orange>Hero</>, <Orange>Pembela</>, dan <Orange>Penyintas</> yang kamu gunakan. Jika kamu lebih suka cara yang lebih praktis dan hanya ingin menaikkan level <Orange>Hero</>, <Orange>Pembela</>, dan <Orange>Penyintas</> secara manual, kamu bisa menonaktifkan fitur <Orange>Terapkan XP Pengguna Secara Otomatis</> di menu <Orange>Pengaturan</>.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="F1152D3443394272D011818B737EFB50", NativeString="Commander, your <Orange>defenders</> are ready for duty!", LocalizedStrings=(("id","Komandan, para <Orange>pembela</> siap bertugas!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="D553170E42D2B870702F3AA27D2C2B0E", NativeString="<Orange>Defenders</> can now be <Orange>upgraded</>. Inspect a <Orange>defender</> and try it!", LocalizedStrings=(("id","<Orange>Pembela</> kini bisa <Orange>di-upgrade</>. Periksa <Orange>pembela</> dan cobalah!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="030E577346E0C7A7E2B4B598C696889E", NativeString="Your <Orange>Hero Loadout</> defines your role on the battlefield. As you unlock more <Orange>Heroes</>, the combinations of <Orange>Perks</> can become almost limitless! Find synergies and combinations that best support your playstyle and mission objectives!", LocalizedStrings=(("id","<Orange>Set Tempur Hero</> milikmu menentukan peranmu di medan tempur. Saat kamu membuka lebih banyak <Orange>Hero</>, kombinasi <Orange>Keuntungan</> bisa jadi hampir tak terbatas! Temukan sinergi dan kombinasi yang paling mendukung gaya bermain dan objective dari misimu!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="AADBD1334C9F743799ECD18AE3D7A56B", NativeString="You now have access to <Orange>team perks</>. I've given you a few to try out.", LocalizedStrings=(("id","Sekarang, kamu bisa mengakses <Orange>keuntungan tim</>. Aku sudah memberikan beberapa contoh kepadamu.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="9D25DD4447B0CAD75EA2BD8FBA5B5F01", NativeString="Now select a <Orange>Team Perk</> to add it to your <Orange>Hero Loadout</>.", LocalizedStrings=(("id","Sekarang, pilih <Orange>Keuntungan Tim</> untuk ditambahkan ke <Orange>Set Tempur Hero</> milikmu.")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="9ACABAC745B1EC0F4555BCB7AF04A0E1", NativeString="This brings up a list of all your <Orange>Heroes</>. <Orange>Heroes</> that are currently assigned to <Orange>Hero Loadouts</> are not available for <Orange>Expeditions</> and are marked with a <Orange>Lock</>.", LocalizedStrings=(("id","Ini akan memunculkan daftar semua <Orange>Hero</> milikmu. Para <Orange>Hero</> yang saat ini ditugaskan ke <Orange>Set Tempur Hero</> tidak tersedia untuk <Orange>Ekspedisi</> dan ditandai dengan sebuah <Orange>Kunci</>.")))
