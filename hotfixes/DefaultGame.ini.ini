+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="B4105851469B7F463BB3E5A676906B8A", NativeString="<empha>Upgrade your Ninjago Island Village to Level 3.</> Check the Villlage Square to see the resources you'll need to upgrade your new Village into a place that the Ninja can call home!", LocalizedStrings=(("tr","<empha>Ninjago Adası köyünü 3. seviyeye yükselt.</> Yeni köyünü Ninjalara yuva olacak bir yer haline getirmek için ihtiyacın olan kaynakları görmek için Köy Meydanı'na bak!"),("vi","<empha>Nâng cấp Làng Đảo Ninjago của bạn lên Cấp 3.</> Hãy kiểm tra Quảng Trường Làng để xem các tài nguyên mà bạn cần để nâng cấp ngôi Làng mới của bạn thành nhà cho các ninja!"),("zh-Hant","<empha>將你的旋風忍者島村莊提升至 3 級。</>前往村莊廣場，查看將新村莊升級成忍者之鄉所需的資源吧！")))
