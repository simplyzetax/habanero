+TextReplacements=(Category=Game, Namespace="", Key="88EFC4C0460B73E4CB9201A22AFFE0C3", NativeString="Includes customizable decals! Decals in this bundle are restricted to the TBD car body. This car will fill the SUV slot in relevant Fortnite experiences.", LocalizedStrings=(("ar","تتضمن ملصقات قابلة للتخصيص! تقتصر ملصقات هذه الحزمة على هيكل سيارة Rivian R1S. ستملأ هذه السيارة خانة سيارة الدفع الرباعي في تجارب Fortnite ذات الصلة."),("en","Includes customizable decals! Decals in this bundle are restricted to the Rivian R1S car body. This car will fill the SUV slot in relevant Fortnite experiences."),("de","Enthält anpassbare Aufkleber! Die Aufkleber in diesem Paket sind auf die Karosserie „Rivian R1S“ beschränkt. Dieses Auto belegt in relevanten Fortnite-Erlebnissen den SUV-Slot."),("es","¡Incluye calcomanías personalizables! Las calcomanías de este lote solo están disponibles para la carrocería del Rivian R1S. Este vehículo ocupará el espacio del SUV en las experiencias de Fortnite pertinentes."),("es-419","¡Incluye calcomanías personalizables! Las calcomanías de este lote solo están disponibles para la carrocería Rivian R1S. Este auto llenará el espacio de TrailSmasher en las experiencias de Fortnite pertinentes."),("fr","Comprend des stickers personnalisables ! Les stickers de ce pack ne fonctionnent que sur le châssis de la Rivian R1S. Ce véhicule sera placé dans l'emplacement SUV des expériences de Fortnite concernées."),("id","Termasuk stiker yang bisa dikustom! Stiker dalam bundel ini terbatas untuk bodi mobil Rivian R1S. Mobil ini akan mengisi slot SUV dalam pengalaman bermain Fortnite terkait."),("it","Include adesivi personalizzabili! Gli adesivi di questo bundle sono limitati alla carrozzeria Rivian R1S. Questa auto occuperà lo slot SUV nelle esperienze di Fortnite del caso."),("ja","カスタマイズ可能なデカールが付属！ このバンドル内のデカールは、マシンのボディ「Rivian R1S」に限定されています。このマシンは、対応しているフォートナイトの体験においてSUVとして使用できます。"),("ko","커스터마이징 가능한 데칼 포함! 이 번들의 데칼은 리비안 R1S 차체에만 사용할 수 있습니다. 이 차량은 관련 포트나이트 경험에서 SUV 슬롯에 할당됩니다."),("pl","W zestawie konfigurowalne wzory! Wzory z tego zestawu można wykorzystać tylko w połączeniu z karoserią Rivian R1S. Ten samochód znajdzie się w polu SUV-a we wszystkich odpowiednich przygodach Fortnite."),("pt-BR","Inclui adesivos personalizáveis! Os Adesivos deste pacote são restritos ao Chassi Rivian R1S. Este carro preencherá o espaço de SUV nas experiências Fortnite relevantes."),("ru","Включает настраиваемые декали! Декали из этого комплекта совместимы только с кузовом Rivian R1S. Эта машина будет занимать ячейку внедорожника в соответствующих режимах Fortnite."),("th","มาพร้อมกับลายแต่งคัสตอม! ลายแต่งในบันเดิลนี้จำกัดเฉพาะตัวถังรถ Rivian R1S เท่านั้น รถคันนี้จะถูกเพิ่มลงบนช่องรถ SUV ในประสบการณ์ Fortnite ที่เกี่ยวข้อง"),("tr","Özelleştirilebilir çıkartmalar içerir! Bu paketteki çıkartmaları yalnızca Rivian R1S araba gövdesiyle kullanabilirsin. Bu araba uygun Fortnite deneyimlerinde SUV yuvasını doldurur."),("vi","Thỏa sức tùy chỉnh hình dán theo ý thích! Hình dán trong bộ quà này chỉ dành riêng cho thân xe Rivian R1S. Mẫu xe này sẽ được đưa vào ô Xe SUV trong các chế độ chơi Fortnite phù hợp."),("zh-hans","包括可自定义的涂装！该同捆包中的涂装仅可用于Rivian R1S车体。在Fortnite相关体验中，该车会出现在SUV栏位。"),("zh-Hant","當中包含可自訂貼花！此組合包的貼花僅限 Rivian R1S 車身使用。此車輛會在相關 Fortnite 體驗填入 SUV 欄位。")))
