+TextReplacements=(Category=Game, Namespace="", Key="230BB0CB48029BD4491ABFA9E0B459C8", NativeString="<text color=\"FFFFFFFF\">Supernova Jets</> Back Bling", LocalizedStrings=(("ar","<text color=\"FFFFFFFF\">حزمة مهام الطبيعة التقنية:</> <text color=\"59DDECFF\">اربح ما يصل إلى 800 من عملات V-Bucks عند إكمال المهام ذات الصلة!</>"),("en","<text color=\"FFFFFFFF\">Perfected Nature Quest Bundle:</> <text color=\"59DDECFF\">Earn up to 800 V-Bucks as you complete applicable quests!</>"),("de","<text color=\"FFFFFFFF\">\"Perfektionierte Natur\"-Auftragspaket:</> <text color=\"59DDECFF\">Verdiene bis zu 800 V-Bucks durch den Abschluss entsprechender Aufträge!</>"),("es","<text color=\"FFFFFFFF\">Lote de misiones de Naturaleza perfeccionada:</> <text color=\"59DDECFF\">¡consigue hasta 800 paVos por completar misiones!</>"),("es-419","<text color=\"FFFFFFFF\">Lote de misiones de Naturaleza perfeccionada:</> <text color=\"59DDECFF\">¡obtén hasta 800 monedas V al completar las misiones correspondientes!</>"),("fr","<text color=\"FFFFFFFF\">Le pack de quêtes Nature parfaite :</> <text color=\"59DDECFF\">obtenez jusqu'à 800 V-bucks en accomplissant les quêtes applicables !</>"),("id","<text color=\"FFFFFFFF\">Bundel Quest Alam Sempurna:</> <text color=\"59DDECFF\">Dapatkan hingga 800 V-Buck saat kamu menyelesaikan quest yang memenuhi syarat!</>"),("it","<text color=\"FFFFFFFF\">Bundle incarichi Natura perfezionata:</> <text color=\"59DDECFF\">ottieni fino a 800 V-buck completando gli incarichi disponibili!</>"),("ja","<text color=\"FFFFFFFF\">パーフェクテッドネイチャー クエストバンドル: </> <text color=\"59DDECFF\">対象クエストをクリアして最大800 V-Bucksを獲得しよう！</>"),("ko","<text color=\"FFFFFFFF\">완벽해진 자연 퀘스트 번들:</> <text color=\"59DDECFF\">해당 퀘스트를 완료하고 최대 800 V-Bucks를 얻으세요!</>"),("pl","<text color=\"FFFFFFFF\">Pakiet zadań Natura Udoskonalona:</> <text color=\"59DDECFF\">zdobądź nawet 800 V-dolców, wykonując dostępne zadania!</>"),("pt-BR","<text color=\"FFFFFFFF\">Pacotão de Tarefas Natureza Aperfeiçoada:</> <text color=\"59DDECFF\">Ganhe até 800 V-Bucks ao concluir tarefas aplicáveis!</>"),("ru","<text color=\"FFFFFFFF\">Набор заданий «Совершенство от природы»:</> <text color=\"59DDECFF\">заработайте до 800 В-баксов за выполнение соответствующих заданий!</>"),("th","<text color=\"FFFFFFFF\">บันเดิลเควสต์ธรรมชาติสมบูรณ์แบบ:</> <text color=\"59DDECFF\">รับสูงสุด 800 วีบั๊กเมื่อทำเควสต์สำเร็จ!</>"),("tr","<text color=\"FFFFFFFF\">Doğa Bilgini Görev Paketi:</> <text color=\"59DDECFF\">Uygun görevleri tamamladıkça 800'e kadar V-Papel kazan!</>"),("vi","<text color=\"FFFFFFFF\">Bộ Quà Nhiệm Vụ Tự Nhiên Thuần Chất:</> <text color=\"59DDECFF\">Tích lũy tới 800 V-Buck khi bạn hoàn thành nhiệm vụ tương ứng!</>"),("zh-hans","<text color=\"FFFFFFFF\">完美本源任务同捆包：</><text color=\"59DDECFF\">完成指定任务，最多可赚取800V币！</>"),("zh-Hant","<text color=\"FFFFFFFF\">完美大自然任務組合包：</> <text color=\"59DDECFF\">完成相關任務最多可獲得 800 V-Buck！</>")))
