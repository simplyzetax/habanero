+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="0BF1FDEE4D760832CCF0D6A3A75CD61D", NativeString="<empha>Kai</> the Master of ELEMENTAL FIRE, has returned to the <img id=\"IcoNinja\"/><empha>Monastery of Spinjitzu</>! He looks pretty rough, but it seems like he made a fiery new friend...", LocalizedStrings=(("ar","لقد عاد <empha>كاي</>، سيد عنصر النار، إلى <img id=\"IcoNinja\"/><empha>معقِل سبينجيتسو</>! يبدو في حالة مزرية، لكن أظنه كوّن صداقة مع تنين نار جديد..."),("vi","<empha>Kai</>, Bậc Thầy NGUYÊN TỐ HỆ HỎA, đã trở lại <img id=\"IcoNinja\"/><empha>Tu Viện Thuật Xoáy Lốc</>! Trông anh ấy khá gai góc, nhưng có vẻ như anh ấy đã kết bạn với một người bạn mới rực lửa...")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="B508033C43BF988E0199DC97FFD76ACC", NativeString="Asher wants you to <empha>Craft a FIRE Relic</> at a Ninja Workbench. You'll need <empha>a Ninja Betrayer Headband, FIRE Energy, an ELEMENTAL animal resource, and some Honed materials.</>", LocalizedStrings=(("tr","Asher senden Ninja Çalışma Tezgâhı'nda <empha>bir ATEŞ Eseri</> üretmeni istiyor. <empha>Bir Ninja Haini'nin Bandanası, ATEŞ Enerjisi, bir ELEMENTAL hayvan kaynağı ve biraz da Bilenmiş malzeme gerekecek.</>"),("vi","Asher muốn bạn <empha>Chế tạo một Cổ Vật Hệ HỎA</> tại Bàn Làm Việc Ninja. Bạn sẽ cần một chiếc <empha>Băng Đô Ninja Phản Bội, Năng Lượng Hệ HỎA, một món tài nguyên từ động vật NGUYÊN TỐ và một ít nguyên liệu Tinh Luyện.</>")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="D3AE2D4849E21659730DCDB2D92042AC", NativeString="The best way to show the Shatter Spawn we're not afraid is by making <emphasis>Ninjago Island</> our own! Get out there and <emphasis>start a Village</>! Fill it full of Sheep... or Villagers... or cannons... or Pizzas... whatever speaks to you!", LocalizedStrings=(("ar","أفضل طريقة لنُظهر أننا لا نخاف من نسل المدمر هي أن نجعل <emphasis>جزيرة Ninjago</> ملكًا لنا! انطلق إلى هناك و<emphasis>ابنِ قرية</>! املأها بالخراف... أو بالقرويين... أو بالمدافع... أو بالبيتزا... أيًا كان ما يُلهمك!"),("id","Cara terbaik untuk menunjukkan pada Spawn Shatter bahwa kita tidak takut adalah dengan mengendalikan <emphasis>Pulau Ninjago</>! Pergilah ke sana dan <emphasis>mulai mendirikan Desa</>! Penuhi dengan Domba ... atau Warga Desa ... atau meriam ... atau Piza ... apa pun yang kamu suka!"),("th","วิธีที่จะแสดงให้มังกรแห่งความพินาศเห็นว่าเราไม่กลัวได้ดีที่สุดก็คือทำให้<emphasis>เกาะนินจาโก</> เป็นของเราเอง! ออกไปแล้ว<emphasis>เริ่มสร้างหมู่บ้าน</>เลย! เติมเกาะให้เต็มไปด้วยแกะ... หรือชาวบ้าน... หรือปืนใหญ่... หรือพิซซ่า... อะไรก็ได้ที่ใช่สำหรับคุณ!"),("tr","Parçalayan Minyonlara korkmadığımızı göstermenin en iyi yolu, <emphasis>Ninjago Adası</>'nı bizim yapmak! Hadi dışarı çık ve <emphasis>bir Köy inşa etmeye</> başla! Onu koyunlarla... ya da köylülerle... ya da toplarla... ya da pizzalarla... yani tarzına uyan neyse onunla doldur!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="60271D0140C741C874888DBE4B055AAD", NativeString="You ICED THAT ICE DRAGON! N-ICE! Cole's gonna want to hear about this!", LocalizedStrings=(("fr","VOUS AVEZ REFROIDI CE DRAGON ! COOL ! Allez donc en parler à Cole !"),("th","คุณล้มมังกรน้ำแข็งได้แล้ว! เฉียบ! โคลต้องอยากฟังเรื่องนี้แน่!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="A8DF5A5C40DFF3174FD463815806451C", NativeString="A New Route to New Roots", LocalizedStrings=(("th","เส้นทางใหม่สู่การลงหลักปักฐาน")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="8DA8E85F452B0D2AC47D098B6A0B1E3C", NativeString="Now you're ready to fight FIRE with FIRE! (Well, you'll probably have better luck fighting EARTH with FIRE, since that's EARTH'S ELEMENTAL weakness...) Anyways, Asher will be excited to hear you've crafted a Relic!", LocalizedStrings=(("tr","Artık ATEŞE ATEŞLE karşılık vermeye hazırsın! (Gerçi ATEŞ ile TOPRAK elementine karşı savaşırken daha çok şansın olur, çünkü TOPRAK elementinin zayıflığı bu...) Neyse, Asher bir Eser ürettiğini duyunca çok sevinecek!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="66ED94194CD6F160BBF0F085193CA4AE", NativeString="<empha>Close Portals</> by Ninja throwing <empha>Chaos Embers</> inside. (It's just like regular throwing, but more stylish, because you're a Ninja). Close enough and you'll summon an ICE Dragon! (They really love their Portals.) Zane left a note for you: To get an edge against this enemy, gear up with ELEMENTAL Defiance Charms and LIGHTNING Weapons!", LocalizedStrings=(("th","<empha>ปิดประตูมิติ</>โดยใช้วิชานินจาขว้าง<empha>เคออสเอ็มเบอร์</>เข้าไปข้างใน (เหมือนการขว้างปกตินั่นแหละ แต่เท่กว่านิดหน่อยเพราะคุณเป็นนินจา) ปิดประตูมิติพอประมาณแล้วคุณจะอัญเชิญมังกรน้ำแข็งออกมาได้! (พวกมันชอบประตูมิติมากๆ) เซนทิ้งข้อความไว้ให้คุณ: ให้เตรียมตัวสวมเครื่องรางปัดป้องปราณธาตุและอาวุธธาตุไฟฟ้าเพื่อชิงความได้เปรียบจากศัตรูตัวนี้!"),("vi","<empha>Đóng Cổng</> bằng cách ném <empha>Tàn Lửa Hỗn Mang</> theo kiểu ninja vào phía trong. (Giống như cách ném thông thường, nhưng phong cách hơn, vì bạn là ninja mà). Đóng đủ số cổng cần thiết và bạn sẽ triệu hồi được một con Rồng BĂNG! (Chúng thật sự rất thích Cổng của mình). Zane để lại cho bạn một lời nhắn: Để chiếm lợi thế trước kẻ địch này, hãy trang bị Bùa Kháng NGUYÊN TỐ và Vũ Khí Hệ SÉT!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="FF7D5CCB4D00F9D3B50B2D92AECDCFDC", NativeString="Best Served Cold", LocalizedStrings=(("th","เย็นๆ นี่แหละดีที่สุด")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="2B152265444A41FA2290FDB77173F41C", NativeString="Hold <keybind>Target</> and release to pull enemies closer to you, or hold <keybind touch_tag=\"MobileHUD.Button.Juno.MainHand\">Fire</> and release to push enemies further away!", LocalizedStrings=(("tr","<keybind>Target</> tuşunu basılı tuttuktan sonra düşmanları kendine yaklaştırmak için bırak veya <keybind touch_tag=\"MobileHUD.Button.Juno.MainHand\">Fire</> tuşunu basılı tuttuktan sonra düşmanları daha uzağa itmek için bırak!")))
