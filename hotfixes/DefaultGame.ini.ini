+TextReplacements=(Category=Game, Namespace="", Key="D37D8ADD4B57F647E7F26D919988D055", NativeString="Complete Vengeance Jones' Vengeance Returns quest to unlock crafting recipe.", LocalizedStrings=(("ar","ابحث عن سيد عنصر الأرض وتعلّم في تبويب إتقان النينجا (المستوى 5)\n\nتعلّم في تبويب إتقان النينجا (المستويات 6 و7 و8)"),("en","Seek the ELEMENTAL Master of EARTH and learn in the Ninja Mastery Tab (T5)\n\nLearn in the Ninja Mastery Tab (T6, T7, T8)"),("de","Suche den ELEMENTARMEISTER der ERDE auf und erlerne das Rezept im Ninja-Beherrschung-Tab (T5)\n\nErlernbar im Ninja-Beherrschung-Tab (T6, T7, T8)"),("es","Busca al maestro elemental de tierra y obtén información en la pestaña Maestría de Ninja (nivel 5)\n\nObtén información en la pestaña Maestría de Ninja (niveles 6, 7 y 8)"),("es-419","Busca al maestro elemental de tierra y obtén información en la pestaña Maestría ninja (nivel 5)\n\nObtén información en la pestaña Maestría ninja (niveles 6, 7 y 8)"),("fr","Cherchez le maître ÉLÉMENTAIRE de la TERRE et apprenez dans l'onglet Maîtrises ninjas (T5)\n\nSe trouve dans l'onglet Maîtrises ninjas (T6, T7, T8)"),("id","Cari Master ELEMENTAL TANAH dan pelajari di Tab Penguasaan Ninja (T5)\n\nPelajari di Tab Penguasaan Ninja (T6, T7, T8)"),("it","Cerca il maestro ELEMENTALE della TERRA e apprendi nella scheda Maestria ninja (T5)\n\nApprendi nella scheda Maestria ninja (T6, T7, T8)"),("ja","大地のエレメントマスターを探し、ニンジャマスタリータブ(ティア5)で習得\n\nニンジャマスタリータブ(ティア6、ティア7、ティア8)で習得"),("ko","흙의 원소 마스터를 찾아 닌자 숙련 탭에서 배우기(T5)\n\n닌자 숙련 탭에서 배우기(T6, T7, T8)"),("pl","Poszukaj Mistrza ŻYWIOŁU ZIEMI i ucz się w zakładce Mistrzostwa ninji (T5)\n\nUcz się w zakładce Mistrzostwa ninji (T6, T7, T8)"),("pt-BR","Procure o Mestre da TERRA ELEMENTAL e aprenda na aba Maestria Ninja (T5)\n\nAprenda na aba Maestria Ninja (T6, T7, T8)"),("ru","Найдите мастера стихии земли и изучите на вкладке мастерства ниндзя (ур. 5)\n\nИзучите на вкладке мастерства ниндзя (ур. 6, 7, 8)"),("th","ตามหาปรมาจารย์ธาตุดินแล้วเรียนรู้ได้ในแท็บความเชี่ยวชาญนินจา (ขั้น 5)\n\nเรียนรู้ได้ในแท็บความเชี่ยวชาญนินจา (ขั้น 6, ขั้น 7, ขั้น 8)"),("tr","TOPRAK ELEMENT Ustası'nı ara ve Ninja Uzmanlığı Sekmesi'nde öğren (T5)\n\nNinja Uzmanlığı Sekmesi'nde öğren (T6, T7, T8)"),("vi","Tìm Đại Sư NGUYÊN TỐ THỔ và lĩnh hội kiến thức trong Tab Thông Thạo Ninja (T5)\n\nHọc trong Tab Thông Thạo Ninja (T6, T7, T8)"),("zh-hans","寻找土元素大师，并在忍者精通标签页（T5）中学习\n\n在忍者精通标签页（T6、T7、T8）中学习"),("zh-Hant","尋找大地元素大師，並於忍者大師頁面 (T5) 中學習\n\n於忍者大師頁面 (T6、T7、T8) 中學習")))
