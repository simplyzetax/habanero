+TextReplacements=(Category=Game, Namespace="", Key="90CE71F740996CBCFBE1DDACC113D959", NativeString="Playing Mic Vocals with Voice Chat enabled?", LocalizedStrings=(("ar","هل ترغب في لعب وضع الكاريوكي عند تفعيل الدردشة الصوتية؟"),("en","Playing Karaoke with Voice Chat enabled?"),("de","Karaoke mit eingeschaltetem Sprach-Chat spielen?"),("es","¿Vas a cantar karaoke con el chat de voz habilitado?"),("es-419","¿Vas a cantar karaoke con el chat de voz habilitado?"),("fr","Vous jouez en mode karaoké avec la discussion vocale activée ?"),("id","Main Karaoke dengan Obrolan Suara diaktifkan?"),("it","Vuoi cantare al karaoke con la chat vocale attiva?"),("ja","ボイスチャットを有効化してカラオケを歌いますか？"),("ko","음성 채팅을 켠 상태로 노래방을 플레이하시나요?"),("pl","Grasz w karaoke z włączonym czatem głosowym?"),("pt-BR","Vai cantar Karaokê com Bate-papo de Voz habilitado?"),("ru","Поёте в караоке при включённом голосовом чате?"),("th","เล่นคาราโอเกะพร้อมกับเปิดแชทเสียงหรือไม่?"),("tr","Sesli sohbet etkinken Karaoke mi yapıyorsun?"),("vi","Hát Karaoke khi bật Đàm Thoại?"),("zh-hans","开启语音聊天时游玩卡拉OK？"),("zh-Hant","要啟用語音聊天來唱卡拉 OK 嗎？")))
+TextReplacements=(Category=Game, Namespace="", Key="3A9405B94187BCE553EFF3A197B2A695", NativeString="Playing Mic Vocals? Sing into your mic and match the pitch of the incoming notes. The more accurate your pitch, the higher your score.", LocalizedStrings=(("ar","هل ترغب في لعب وضع الكاريوكي؟ غنِ في الميكروفون وطابق حدة صوت النغمات الواردة. كلما ازدادت دقة حدة الصوت، ارتفعت نتيجتك."),("en","Playing Karaoke? Sing into your mic and match the pitch of the incoming notes. The more accurate your pitch, the higher your score."),("de","Karaoke spielen? Sing in dein Mikrofon und triff die Tonlage der Noten. Je genauer deine Tonlage, desto mehr Punkte erhältst du!"),("es","¿Vas a cantar karaoke? Canta con tu micro e iguala el tono de las notas que van llegando. Cuanto más afines el tono, más alta será tu puntuación."),("es-419","¿Vas a cantar karaoke? Canta con tu micrófono y sigue el tono de las notas. Mientras más preciso sea tu tono, mayor será tu puntaje."),("fr","Vous jouez en mode karaoké ? Chantez dans le micro et respectez la hauteur des notes qui arrivent. Plus vous chantez juste, plus votre score est élevé."),("id","Main Karaoke? Bernyanyi pada mikrofon dan samakan nada dengan not yang masuk. Makin akurat nada kamu, makin tinggi pula skormu."),("it","Vuoi cantare al karaoke? Canta nel microfono e riproduci la tonalità delle note in arrivo. Migliore è la tua intonazione, maggiore sarà il tuo punteggio."),("ja","カラオケをプレイ？マイクに向かって歌って、流れてくるノートの音程に合わせよう。音程が正確なほど、スコアが高くなるぞ。"),("ko","노래방을 플레이하시나요? 마이크에 대고 노래하며 다가오는 노트의 음정에 맞추세요. 음정이 정확할수록 획득하는 점수도 증가합니다."),("pl","Grasz w karaoke? Śpiewaj do mikrofonu i dopasuj ton głosu do kolejnych nut. Im dokładniej trafisz w wysokość dźwięku, tym wyższy będzie twój wynik."),("pt-BR","Vai cantar Karaokê? Cante no microfone e acerte o tom das notas que chegam. Quanto mais preciso for o seu tom, maior será sua pontuação."),("ru","Играете в режиме «Караоке»? Пойте в микрофон и попадайте в тон появляющихся нот. Чем точнее вы попадаете в тон, тем больше ваш счёт."),("th","เล่นคาราโอเกะหรือไม่? ร้องใส่ไมค์และปรับระดับเสียงให้ตรงกับโน้ตที่เข้ามา ยิ่งร้องได้ตรงคีย์มากเท่าไร ก็จะได้คะแนนสูงขึ้นเท่านั้น"),("tr","Karaoke mi yapıyorsun? Gelen notaların perdesiyle uyumlu olacak şekilde mikrofonuna şarkı söyle. Ne kadar doğru perdeden söylersen puanın da o kadar yüksek olur."),("vi","Đang hát Karaoke à? Hát vào micro của bạn và hát đúng cao độ của các nốt nhạc hiện ra trên màn hình. Cao độ của bạn càng chính xác thì điểm càng cao."),("zh-hans","游玩卡拉OK？对着麦克风唱歌，吻合传入音符的音高。音高越准，得分越高。"),("zh-Hant","要唱卡拉 OK 嗎？對著麥克風演唱，精準捕捉音符音高。你的音高越準確，得到的分數就越高。")))
+TextReplacements=(Category=Game, Namespace="", Key="327BD3B94FA569A1CBE966933F6A48E7", NativeString="Pick a part - Tap Vocals, Bass, Lead, Drums, or Mic Vocals. Have a compatible peripheral? Choose Pro Lead, Pro Bass, or Pro Drums.", LocalizedStrings=(("ar","اختر دورًا - الصوتيات (الأزرار) أو الباس أو النغمات الرئيسية أو الطبول أو الكاريوكي. هل لديك ملحق خارجي متوافق؟ اختر النغمات الرئيسية الاحترافية أو الباس الاحترافي أو الطبول الاحترافية."),("en","Pick a part - Tap Vocals, Bass, Lead, Drums, or Karaoke. Have a compatible peripheral? Choose Pro Lead, Pro Bass, or Pro Drums."),("de","Wähle eine Rolle: Tipp-Gesang, Bass, Hauptinstrument, Schlagzeug oder Karaoke. Hast du ein kompatibles Eingabegerät? Wähle ein Profi-Hauptinstrument, Profi-Bass oder Profi-Schlagzeug."),("es","Elige una parte: voz (clásica), bajo, instrumento principal, batería o karaoke. ¿Tienes un periférico compatible? Elige Instrumento principal profesional, Bajo profesional o Batería profesional."),("es-419","Elige entre voz (estándar), bajo, instrumento principal, batería o karaoke. ¿Tienes un periférico compatible? Elige el instrumento principal pro, el bajo pro o la batería pro."),("fr","Choisissez votre rôle : chant version classique, basse, instrument principal, batterie ou karaoké. Vous avez un périphérique compatible ? Choisissez l'instrument principal pro, la basse pro ou la batterie pro."),("id","Pilih bagian - Vokal Standar, Bass, Lead, Drum, atau Karaoke. Punya perangkat tambahan yang kompatibel? Pilih Lead Pro, Bas Pro, atau Drum Pro."),("it","Scegli una parte: voce (comandi), basso, chitarra, batteria o karaoke. Hai una periferica compatibile? Seleziona chitarra pro, basso pro o batteria pro."),("ja","タップボーカル、ベース、リード、ドラム、またはカラオケをタップして、パートを選ぼう。対応する周辺機器をお持ち？プロリード、プロベース、またはプロドラムを選ぼう。"),("ko","파트 선택 - 보컬, 베이스, 리드 기타, 드럼 또는 노래방을 탭하세요. 호환되는 주변 기기가 있나요? 프로 리드 기타, 프로 베이스 또는 프로 드럼을 선택하세요."),("pl","Wybierz partię – „wokal dotykowy”, „bas”, „instrument prowadzący”, „perkusja” lub „karaoke”. Masz zgodne urządzenie peryferyjne? Wybierz profesjonalny instrument prowadzący, profesjonalny bas lub profesjonalną perkusję."),("pt-BR","Escolha uma função: Vocal (Botões), Baixo, Base, Bateria ou Vocal (Voz). Tem um periférico compatível? Escolha Base (Pro), Baixo (Pro) ou Bateria (Pro)."),("ru","Выберите вариант — «Вокал касанием», «Бас», «Лид-гитара», «Ударные» или «Караоке». Есть совместимое внешнее устройство? Тогда выберите «Внешняя лид-гитара», «Внешняя бас-гитара» или «Внешние ударные»."),("th","เลือกตำแหน่งที่จะเล่น - นักร้อง (เคาะจังหวะ) เบส กีตาร์ลีด กลอง หรือคาราโอเกะ หากคุณมีอุปกรณ์ต่อพ่วงที่สามารถใช้กับเกมได้ เลือกโปรลีด โปรเบส หรือโปรกลอง"),("tr","Basmalı Vokal, Bas, Lead, Bateri veya Karaoke arasından bir kısım seç. Uyumlu bir donanımın mı var? Pro Lead, Pro Bas veya Pro Bateri seçeneklerini seç."),("vi","Chọn một vai trò: Hòa Ca Bằng Phím Nhấn, Guitar Bass, Guitar Chính, Dàn Trống hoặc Karaoke. Bạn có thiết bị ngoại vi tương thích chứ? Chọn Guitar Chính Chuyên Nghiệp, Guitar Bass Chuyên Nghiệp hoặc Chơi Trống Chuyên Nghiệp."),("zh-hans","选择一个声部——触屏主唱、贝斯、主音吉他、架子鼓或卡拉OK。有兼容的外设？选择专业主音吉他、专业贝斯或专业架子鼓。"),("zh-Hant","選擇其中一個位置：擊鍵主唱、貝斯、主奏、爵士鼓或卡拉 OK。有相容的外接設備嗎？選擇專業主奏、專業貝斯或專業爵士鼓。")))
+TextReplacements=(Category=Game, Namespace="", Key="E0D6B8474C34338ADC1551BCAFE5B711", NativeString="Select a difficulty. The higher the difficulty, the more notes to play. Playing Mic Vocals? Harder difficulties require more accurate pitch.", LocalizedStrings=(("ar","حدد مستوى الصعوبة. كلما زاد مستوى الصعوبة، زادت النغمات التي يجب عزفها. هل ترغب في لعب وضع الكاريوكي؟ مستويات الصعوبة الأعلى تتطلب دقة أكبر في حدة الصوت."),("en","Select a difficulty. The higher the difficulty, the more notes to play. Playing Karaoke? Harder difficulties require more accurate pitch."),("de","Wähle einen Schwierigkeitsgrad. Je höher er ist, desto mehr Noten musst du spielen. Karaoke spielen? Auf höheren Schwierigkeitsgraden musst du die Tonlage genauer treffen."),("es","Selecciona la dificultad. Cuanto mayor sea, más notas tendrás que tocar. ¿Vas a cantar karaoke? Los niveles de dificultad más altos exigen una entonación más precisa."),("es-419","Selecciona una dificultad. Cuanto más alta sea la dificultad, más notas tendrás que tocar. ¿Vas a cantar karaoke? Las dificultades más altas requieren un tono más preciso."),("fr","Choisissez une difficulté. Plus la difficulté est élevée, plus vous devez jouer de notes. Vous jouez en mode karaoké ? Plus la difficulté est élevée, plus vous devez chanter juste."),("id","Pilih tingkat kesulitan. Semakin tinggi kesulitannya, semakin banyak not yang harus dimainkan. Main Karaoke? Tingkat kesulitan yang lebih tinggi membutuhkan pitch yang lebih akurat."),("it","Seleziona una difficoltà. Più la modalità è avanzata, più sono le note che devi eseguire. Vuoi cantare al karaoke? Le difficoltà più elevate richiedono un'intonazione più precisa."),("ja","難易度を選択しよう。難易度が高いほど、演奏するノートが増えるぞ。カラオケをプレイ？難易度が高いほど、より正確な音程が必要になるぞ。"),("ko","난이도를 선택하세요. 난이도가 높을수록 연주할 노트가 많아집니다. 노래방을 플레이하시나요? 난이도가 높을수록 음정을 더 정확하게 맞춰야 합니다."),("pl","Wybierz poziom trudności. Im wyższy poziom, tym więcej nut trzeba będzie zagrać. Grasz w karaoke? Wyższe poziomy trudności wymagają bardziej precyzyjnego trafiania w wysokość dźwięku."),("pt-BR","Selecione uma dificuldade. Quanto maior a dificuldade, mais notas você precisará tocar. Vai cantar Karaokê? Dificuldades mais altas exigem afinação mais precisa."),("ru","Выберите уровень сложности. Чем он выше, тем больше нот нужно сыграть. Играете в режиме «Караоке»? Для более высоких уровней сложности требуется более точное попадание в ноты."),("th","เลือกระดับความยาก ยิ่งระดับความยากสูงขึ้นเท่าไร โน้ตที่ต้องเล่นก็จะเยอะขึ้นเท่านั้น เล่นคาราโอเกะหรือไม่? ยิ่งระดับความยากสูงขึ้น ก็ต้องร้องให้ตรงคีย์มากขึ้น"),("tr","Bir zorluk seviyesi seç. Zorluk seviyesi yükseldikçe çalman gereken nota sayısı da artacak. Karaoke mi yapıyorsun? Zorluk seviyesi yükseldikçe tutturman gereken doğru perde sayısı da artacak."),("vi","Chọn độ khó. Độ khó càng cao thì càng có nhiều nốt cần chơi. Đang hát Karaoke à? Độ khó cao hơn đòi hỏi mức cao độ chính xác hơn."),("zh-hans","选择难度。难度越高，需要演奏的音符越多。游玩卡拉OK？难度越高，对音高准确度的要求越严格。"),("zh-Hant","選擇難度。難度越高，需要演奏的音符就越多。要唱卡拉 OK 嗎？難度越高，對音準的要求也會越高。")))
