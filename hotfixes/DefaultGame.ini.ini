+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="C400D7EB462582B3DACFDE8B014E9DC0", NativeString="Most folks just don't appreciate the artistry of repurposing a humble farming implement into a super sweet Ninja weapon. Now that you've crafted Cole's signature weapon, it's time to show him that he's got a fellow <empha>Scythe</> admirerer.", LocalizedStrings=(("vi","Hầu như chẳng ai đánh giá cao nghệ thuật biến một dụng cụ làm nông khiêm tốn thành vũ khí ninja siêu ngầu đâu. Giờ bạn đã chế tạo được vũ khí đặc trưng của Cole, đã đến lúc cho anh ấy thấy có một người hâm mộ <empha>Lưỡi Hái</> nữa giống mình."),("zh-Hant","大多數人都不懂得欣賞這種將普通的農具改造成超酷的忍者武器的藝術。既然你已製作出阿剛的招牌武器，是時候讓他知道，原來他也有一位同樣熱愛<empha>鐮刀</>的夥伴了。")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="0359D0C14C97B3D8084F4185F0C27C3C", NativeString="Powerful Oni are lurking around Ninjago Island! <EmphA>Oni Elders</> are emerging from high <img id=\"Tier\"/> <emphA>Chaos Portals</>, and <EmphA>Oni Tyrants</> have overtaken 8<img id=\"Tier\"/> <EmphA>Chaos Challenges</> in the <empha>Forest of Spirits</>! Get your hands on some 8<img id=\"Tier\"/> <EmphA>Weapons and Charms</> and go defeat them!", LocalizedStrings=(("ko","강력한 도깨비가 닌자고 섬 곳곳에 도사리고 있습니다! <EmphA>도깨비 장로</>가 높은 등급 <img id=\"Tier\"/> <emphA>혼돈의 차원문</>에서 모습을 드러내고, <EmphA>도깨비 폭군</>이 <empha>영혼의 숲</>에 있는 8<img id=\"Tier\"/> <EmphA>혼돈 도전</>을 장악했습니다! 8<img id=\"Tier\"/> <EmphA>무기와 부적</>을 손에 넣고 녀석들을 물리치세요!"),("th","มีโอนิทรงพลังซุ่มอยู่ทั่วเกาะนินจาโก! <EmphA>ผู้อาวุโสโอนิ</>กำลังปรากฏตัวออกมาจาก<emphA>ประตูมิติโกลาหล</>ขั้นสูง <img id=\"Tier\"/>และ<EmphA>ทรราชโอนิ</>ได้เข้ายึด<EmphA>ชาเลนจ์โกลาหล</>ขั้น 8<img id=\"Tier\"/> ใน<empha>ป่าวิญญาณ</>แล้ว! หยิบ<EmphA>อาวุธและเครื่องราง</>ขั้น 8<img id=\"Tier\"/> มาแล้วไปเอาชนะพวกมันซะ!"),("vi","<EmphA>Trưởng Lão Oni</> đang xuất hiện từ <img id=\"Tier\"/> <emphA>Cổng Hỗn Mang</> cấp cao và <EmphA>Bạo Chúa Oni</> đã chiếm lĩnh <EmphA>Thử Thách Hỗn Mang</> 8<img id=\"Tier\"/> ở <empha>Khu Rừng Tinh Linh</>! Hãy kiếm lấy vài món <EmphA>Vũ Khí và Bùa Chú</> 8<img id=\"Tier\"/> rồi đi đánh bại chúng!")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="C17F0FD64BAFA5DC66E65AA19B1DF4C4", NativeString="Cole'd as ELEMENTAL ICE", LocalizedStrings=(("vi","Ngầu như NGUYÊN TỐ HỆ BĂNG")))
+TextReplacements=(Category=Game, Namespace="", bIsMinimalPatch=True, Key="AFA553D441D175DAFEE95BAC83DEE4D8", NativeString="Check out your <emphasis>FIRE Mastery tab</> to Learn new abilities and take this <img id=\"Tier\"/>5<emphasis>FIRE Ink to craft a Scroll of FIRE Spinjitzu</>!", LocalizedStrings=(("ar","ألقِ نظرة على <emphasis>تبويب إتقان النار</> لديك لتعلّم قدرات جديدة وخُذ <img id=\"Tier\"/>5<emphasis>من حبر النار هذا لصنع مخطوطة سبينجيتسو النار</>!"),("de","Sieh im <emphasis>FEUER-Beherrschung-Tab</> nach, um neue Fähigkeiten zu erlernen, und nimm diese <img id=\"Tier\"/>5-<emphasis>FEUERTINTE, um eine FEUER-Spinjitzu-Schriftrolle herzustellen</>!"),("es","¡Echa un vistazo a la <emphasis>pestaña de Maestría de fuego</> para aprender habilidades nuevas y toma estas <img id=\"Tier\"/>5<emphasis>tintas de fuego para fabricar un pergamino del Spinjitzu de fuego</>!"),("es-419","Ve a tu <emphasis>pestaña de maestría de fuego</> para aprender nuevas habilidades y toma estas <img id=\"Tier\"/>5<emphasis>tintas de fuego para fabricar un pergamino de fuego de Spinjitzu</>!"),("fr","Consultez l'<emphasis>onglet Maîtrise du FEU</> pour apprendre de nouvelles compétences. Prenez également cette <emphasis>encre de FEU</> <img id=\"Tier\"/><emphasis>5 pour fabriquer un parchemin de Spinjitzu du FEU</> !"),("id","Lihat <emphasis>tab Penguasaan API</> untuk Mempelajari kemampuan baru dan ambil Tinta API <img id=\"Tier\"/>5<emphasis>ini untuk merakit Gulungan Spinjitzu API</>!"),("it","Dai un'occhiata alla <emphasis>scheda Maestria del FUOCO</> per apprendere nuove abilità e prendi questo <emphasis>inchiostro di FUOCO 5</><img id=\"Tier\"/> <emphasis>per creare una pergamena dello Spinjitzu del FUOCO</>!"),("ja","<emphasis>ファイヤーのマスタリータブ</>をチェックして新しいアビリティを習得し、この<img id=\"Tier\"/>5<emphasis>のファイヤーのインクを使ってファイヤーのスピン術の巻物をクラフトしよう</>！"),("ko","<emphasis>불 숙련 탭</>을 확인해 새로운 능력을 배우고, 이 <img id=\"Tier\"/>5<emphasis>불 잉크를 가져다 불 스핀짓주 두루마리를 제작</>해 보세요!"),("pl","Sprawdź zakładkę <emphasis>Mistrzostwa OGNIA</>, by nauczyć się nowych zdolności i weź ten <emphasis>Tusz OGNIA poziomu <img id=\"Tier\"/>5, by stworzyć Zwój Spinjitzu OGNIA!</>"),("pt-BR","Confira a aba <emphasis>Maestria de FOGO</> pra aprender novas habilidades, e pegue essa <emphasis>Tinta de FOGO <img id=\"Tier\"/>5 pra criar um Pergaminho de Spinjitzu do FOGO</>!"),("ru","Загляни на <emphasis>вкладку владения огнём</>, чтобы изучить новые способности, и возьми эти <img id=\"Tier\"/>5<emphasis>огненные чернила ур. 5, чтобы создать свиток огненного кружитцу</>!"),("th","ไปดู<emphasis>แท็บความเชี่ยวชาญธาตุไฟ</>เพื่อเรียนรู้ความสามารถใหม่ๆ แล้วรับ<emphasis>หมึกอัคคีขั้น <img id=\"Tier\"/>5 ไปเพื่อคราฟต์คัมภีร์สปินจิตสึธาตุไฟ</>!"),("tr","Yeni Beceriler öğrenmek için <emphasis>ATEŞ Uzmanlık sekmene</> göz at ve <emphasis>ATEŞ Spinjitzu Parşömeni üretmek için bu </><img id=\"Tier\"/><emphasis>5 ATEŞ Mürekkebi</>'ni al!"),("vi","Hãy xem <emphasis>tab Thông Thạo Hệ HỎA</> của bạn để học các khả năng mới và nhận Mực Hệ HỎA <img id=\"Tier\"/>5<emphasis> này để chế tạo Sách Phép Thuật Xoáy Lốc Hệ HỎA</>!"),("zh-hans","查看<emphasis>火系精通标签页</>学习新技能，然后拿上这个<img id=\"Tier\"/>5<emphasis>烈焰墨水，制作一张火系幻影旋转术卷轴</>！"),("zh-Hant","查看你的<emphasis>火焰大師頁面</>來學習新能力，並使用這個 <img id=\"Tier\"/>5<emphasis> 火墨製作火之旋風忍術卷軸</>吧！")))
+TextReplacements=(Category=Game, Namespace="", Key="0FC1F6DA4CA884D9AD2CEB8C8586759B", NativeString="Find Chaos Cubes in or around Ripped Tides", LocalizedStrings=(("ar","اعثر على كل مكعبات الفوضى في الأمواج العاتية أو حولها"),("en","Find all Chaos Cubes in or around Ripped Tides"),("de","Finde alle Chaoswürfel in oder bei Ripped Tides"),("es","Busca cubos del caos en Sociedad Surfista o en sus alrededores"),("es-419","Encuentra todos los cubos de caos en o alrededor de Sociedad Surfista"),("fr","Trouver tous les cubes du chaos dans ou autour des Vagues vaniteuses"),("id","Temukan semua Kubus Kekacauan di dalam atau di sekitar Arus Ganas"),("it","Trova tutti i cubi del caos presso o nei dintorni di Maree Magniloquenti"),("ja","リップト・タイドの内部か周辺で全てのカオスキューブを探す"),("ko","립프드 타이드 안이나 주변에서 모든 카오스 큐브 찾기"),("pl","Znajdź wszystkie sześciany chaosu w Rwących Falach lub ich okolicy"),("pt-BR","Encontre todos os Cubos do Caos dentro ou perto das Correntes Contrárias"),("ru","Найдите все кубы хаоса в Зыбком заливе или рядом с ним"),("th","ค้นหาลูกบาศก์แห่งหายนะทั้งหมดภายในหรือรอบๆ ริปด์ไทด์"),("tr","Güçlü Gelgitler'de veya yakınlarında tüm Kaos Küplerini bul"),("vi","Tìm tất cả Khối Vuông Hỗn Mang trong hoặc quanh Thủy Triều Liêu Xiêu"),("zh-hans","在撕裂潮汐或其附近找到所有混沌魔方"),("zh-Hant","在怒潮角或周圍找到所有混沌方塊")))
