+TextReplacements=(Category=Game, Namespace="", Key="645D0C5540EAA1C0B43C119CB92A44A1", NativeString="You have a chance to find additional rare items when opening chests. Chance increases at each Level Up: 10% -> 15% -> 20% -> 25% -> 30% chance to find additional rare loot", LocalizedStrings=(("ar","لديك فرصة للعثور على عناصر نادرة إضافية عند فتح الصناديق. تزداد الفرصة عند رفع كل مستوى: احتمالية العثور على مزيد من الغنائم النادرة بنسب 10% -> 12.5% -> 15% -> 17.5% -> 20%."),("en","You have a chance to find additional rare items when opening chests. Chance increases at each Level Up: 10% -> 12.5% -> 15% -> 17.5% -> 20% chance to find additional rare loot"),("de","Du hast eine Chance, zusätzliche seltene Gegenstände beim Öffnen von Truhen zu finden. Die Chance erhöht sich mit jedem Levelaufstieg: Chance von 10 % -> 12,5 % -> 15 % -> 17,5 % -> 20 %, zusätzliche seltene Beute zu finden."),("es","Puedes encontrar objetos raros adicionales al abrir cofres. A medida que sube el nivel, aumenta la probabilidad de encontrar botín raro adicional: 10 % -> 12,5 % -> 15 % -> 17,5 % -> 20 %"),("es-419","Tienes la probabilidad de encontrar objetos raros adicionales al abrir cofres. La probabilidad aumenta con cada subida de nivel: 10 % -> 12.5 % -> 15 % -> 17.5 % -> 20 % de probabilidad de encontrar botín raro adicional."),("fr","Vous avez une chance de trouver des objets rares supplémentaires en ouvrant coffres. Votre chance augmente à chaque gain de niveau : 10% -> 12,5% -> 15% -> 17,5% -> 20% de chance de trouver du butin rare supplémentaire"),("id","Kamu berpeluang menemukan item langka tambahan saat membuka peti. Peluang meningkat tiap kali Naik Level: Peluang 10% -> 12,5% -> 15% -> 17,5% -> 20% untuk menemukan jarahan langka tambahan"),("it","La tua squadra ha la possibilità di trovare oggetti rari aggiuntivi quando apre i forzieri. Le probabilità salgono a ogni aumento di livello: 10% -> 12,5% -> 15% -> 17,5% -> 20% di probabilità di trovare altro bottino raro"),("ja","宝箱から追加のレアなアイテムが見つかる可能性がある。レベルアップごとに確率上昇: 10% -> 12.5% -> 15% -> 17.5% -> 20%の確率でレアなアイテムが出現する"),("ko","상자를 열 때 일정 확률로 추가 희귀 아이템이 등장합니다. 레벨이 오를 때마다 확률 증가: 추가 희귀 전리품 발견 확률 10% -> 12.5% -> 15% -> 17.5% -> 20%"),("pl","Podczas otwierania skrzyń masz szansę znaleźć dodatkowe rzadkie przedmioty. Szansa zwiększa się przy każdym awansie: 10% -> 12,5% -> 15% -> 17,5% -> 20% szansy na znalezienie dodatkowego rzadkiego łupu"),("pt-BR","Você tem uma chance de encontrar mais itens raros ao abrir baús. A chance aumenta a cada Subida de Nível: 10% -> 12,5% -> 15% -> 17,5% -> 20% de chance de encontrar mais saques raros"),("ru","Вы можете найти дополнительные редкие вещи в сундуках. С каждым новым уровнем шанс найти дополнительную редкую добычу возрастает: 10% -> 12,5% -> 15% -> 17,5% -> 20%."),("th","คุณมีโอกาสพบไอเท็มหายากเพิ่มเติมเมื่อเปิดหีบ โอกาสพบไอเทมหายากจะเพิ่มขึ้นทุกครั้งที่เลเวลอัป: 10% -> 12.5% -> 15% -> 17.5% -> 20%"),("tr","Sandık açarken ilave nadir eşyalar bulma ihtimalin var. Seviye atladıkça ihtimal artar: Ek nadir ganimet bulma ihtimali %10 -> %12,5 -> %15 -> %17,5 -> %20 olur."),("vi","Bạn có cơ hội tìm thấy thêm các vật phẩm hiếm khi mở rương. Cơ hội tăng dần theo mỗi lần Tăng Cấp: 10% -> 12,5% -> 15% -> 17,5% -> 20% cơ hội tìm thêm chiến lợi phẩm hiếm."),("zh-hans","打开宝箱时有几率找到额外的稀有物品。每次升级时，找到额外稀有战利品的几率都会增加：10% -> 12.5% -> 15% -> 17.5% -> 20%"),("zh-Hant","你在開啟寶箱時，有機會找到額外的稀有物品。每次升級時，找到額外稀有戰利品的機率提高：10% -> 12.5% -> 15% -> 17.5% -> 20%")))
+TextReplacements=(Category=Game, Namespace="FortSettingValueDiscreteSupervised", Key="ClassInd_SETTING_DESCRIPTION", NativeString="Set the content rating for all devices using this account. Experiences rated higher than the selected rating will require PIN to be unlocked.\n\n<strong>16 years</>: The content has a moderate impact. Strong and frequent violence, mutilation, torture, sexual relations and/or use of illicit drugs may appear.\n\n<strong>14 years</>: The content has a moderate impact. Deaths, eroticization, nudity, and/or insinuations of the use of illicit drugs may appear.\n\n<strong>12 years</>: The content has a light impact. Swearing, sexual language, injuries, blood fights and/or alcohol and cigarette consumption may appear.\n\n<strong>10 years</>: The content may have some impact, especially on young children. Light swearing, weapons, bloodless fights, horror scenes, references to alcohol and cigarettes and/or medicinal use of illicit drugs may appear.\n\n<strong>6 years</>: The content may have a mild impact. Moderate sadness, mildly offensive language, fantasy violence, and educational content about sexuality and drugs may appear.\n\n<strong>All ages</>: The content is suitable for all ages. May contain mild themes such as cartoon violence.\n\nLearn more about ratings: https://www.globalratings.com/ratings-guide-classind", LocalizedStrings=(("ar","عيّن تصنيف المحتوى لجميع الأجهزة باستخدام هذا الحساب. ستتطلب التجارب المُصنفة بتصنيف أعلى من التصنيف المحدد رقم التعريف الشخصي لفتحها.\n\n<strong>16 سنة</>: مناسب لمن بلغوا 16 عامًا فما فوق.\n\n<strong>14 سنة</>: مناسب لمن بلغوا 14 عامًا فما فوق.\n\n<strong>12 سنة</>: مناسب لمن بلغوا 12 عامًا فما فوق.\n\n<strong>10 سنوات</>: مناسب لمن بلغوا 10 أعوام فما فوق.\n\n<strong>6 سنوات</>: مناسب لمن بلغوا 6 أعوام فما فوق.\n\n<strong>جميع الأعمار</>: مناسب لجميع الأعمار.\n\n لمعرفة أكثر عن التصنيفات: https://www.globalratings.com/ratings-guide-classind"),("en","Set the content rating for all devices using this account. Experiences rated higher than the selected rating will require PIN to be unlocked.\n\n<strong>16 years</>: Suitable for those aged 16 and above.\n\n<strong>14 years</>: Suitable for those aged 14 and above.\n\n<strong>12 years</>: Suitable for those aged 12 and above.\n\n<strong>10 years</>: Suitable for those aged 10 and above.\n\n<strong>6 years</>: Suitable for those aged 6 and above.\n\n<strong>All ages</>: Suitable for all ages.\n\nLearn more about ratings: https://www.globalratings.com/ratings-guide-classind"),("de","Legen Sie die Inhaltseinstufung für alle Geräte fest, die dieses Konto verwenden. Für Erlebnisse mit einer höheren Einstufung als die ausgewählte wird eine PIN zum Freischalten benötigt.\n\n<strong>16 Jahre</>: Geeignet für Spieler ab 16 Jahren.\n\n<strong>14 Jahre</>: Geeignet für Spieler ab 14 Jahren.\n\n<strong>12 Jahre</>: Geeignet für Spieler ab 12 Jahren.\n\n<strong>10 Jahre</>: Geeignet für Spieler ab 10 Jahren.\n\n<strong>6 Jahre</>: Geeignet für Spieler ab 6 Jahren.\n\n<strong>Alle Altersgruppen</>: Für alle Altersgruppen geeignet.\n\nErfahren Sie hier mehr über die Einstufungen: https://www.globalratings.com/ratings-guide-classind"),("es","Establece la calificación de contenido para todos los dispositivos en los que se utilice esta cuenta. Es necesario introducir la contraseña para desbloquear las experiencias con una calificación superior a la seleccionada.\n\n<strong>16 años</>: apropiado a partir de los 16 años.\n\n<strong>14 años</>: apropiado a partir de los 14 años.\n\n<strong>12 años</>: apropiado a partir de los 12 años.\n\n<strong>10 años</>: apropiado a partir de los 10 años.\n\n<strong>6 años</>: apropiado a partir de los 6 años.\n\n<strong>Todas las edades</>: apropiado para todas las edades.\n\nMás información sobre las calificaciones en: https://www.globalratings.com/ratings-guide-classind"),("es-419","Establece la clasificación de contenido para todos los dispositivos que usen esta cuenta. Se requerirá un PIN para desbloquear las experiencias con una clasificación más alta que la seleccionada.\n\n<strong>16 años</>: Adecuado para mayores de 16 años.\n\n<strong>14 años</>: Adecuado para mayores de 14 años.\n\n<strong>12 años</>: Adecuado para mayores de 12 años.\n\n<strong>10 años</>: Adecuado para mayores de 10 años.\n\n<strong>6 años</>: Adecuado para mayores de 6 años.\n\n<strong>Todas las edades</>: Adecuado para todas las edades.\n\nMás información sobre las clasificaciones: https://www.globalratings.com/ratings-guide-classind"),("fr","Définissez la classification des contenus pour tous les appareils utilisant ce compte. Les expériences dont la classification est supérieure à celle sélectionnée devront être déverrouillées par un code PIN.\n\n<strong>16 ans</> : contenu adapté aux joueurs âgés de 16 ans et plus.\n\n<strong>14 ans</> : contenu adapté aux joueurs âgés de 14 ans et plus.\n\n<strong>12 ans</> : contenu adapté aux joueurs âgés de 12 ans et plus.\n\n<strong>10 ans</> : contenu adapté aux joueurs âgés de 10 ans et plus.\n\n<strong>6 ans</> : contenu adapté aux joueurs âgés de 6 ans et plus.\n\n<strong>Tout âge</> : contenu adapté aux joueurs de tout âge.\n\nPour en savoir plus sur les classifications : https://www.globalratings.com/ratings-guide-classind"),("id","Atur rating konten untuk semua perangkat yang menggunakan akun ini. Pengalaman bermain dengan rating lebih tinggi dari rating yang dipilih akan memerlukan PIN agar bisa membukanya.\n\n<strong>16 tahun</>: Cocok untuk usia 16 tahun ke atas.\n\n<strong>14 tahun</>: Cocok untuk usia 14 tahun ke atas.\n\n<strong>12 tahun</>: Cocok untuk usia 12 tahun ke atas.\n\n<strong>10 tahun</>: Cocok untuk usia 10 tahun ke atas.\n\n<strong>6 tahun</>: Cocok untuk usia 6 tahun ke atas.\n\n<strong>Semua umur</>: Cocok untuk semua umur.\n\nPelajari info selengkapnya mengenai rating: https://www.globalratings.com/ratings-guide-classind"),("it","Imposta la classificazione dei contenuti per tutti i dispositivi che usano questo account. Per sbloccare le esperienze con una classificazione più alta di quella selezionata sarà necessario un PIN.\n\n<strong>16 anni</>: Adatto dai 16 anni in su.\n\n<strong>14 anni</>: Adatto dai 14 anni in su.\n\n<strong>12 anni</>: Adatto dai 12 anni in su.\n\n<strong>10 anni</>: Adatto dai 10 anni in su.\n\n<strong>6 anni</>: Adatto dai 6 anni in su.\n\n<strong>Tutte le età</>: Adatto a tutte le età.\n\nScopri di più sulle classificazioni: https://www.globalratings.com/ratings-guide-classind"),("ja","このアカウントを使用する全デバイスにおけるコンテンツの年齢評価を設定します。選択した年齢評価よりも上の年齢評価が付けられた体験は、暗証番号によるロックの解除が必要になります。\n\n<strong>16歳</>: 16歳以上向け。\n\n<strong>14歳</>: 14歳以上向け。\n\n<strong>12歳</>: 12歳以上向け。\n\n<strong>10歳</>: 10歳以上向け。\n\n<strong>6歳</>: 6歳以上向け。\n\n<strong>全年齢</>: 全年齢向け。\n\n評価の詳細はこちら: https://www.globalratings.com/ratings-guide-classind"),("ko","이 계정을 사용하는 모든 기기의 콘텐츠 이용등급을 설정합니다. 선택한 이용등급보다 높은 등급의 경험은 PIN이 있어야 잠금 해제할 수 있습니다.\n\n<strong>16세</>: 16세 이상에게 적합합니다.\n\n<strong>14세</>: 14세 이상에게 적합합니다.\n\n<strong>12세</>: 12세 이상에게 적합합니다.\n\n<strong>10세</>: 10세 이상에게 적합합니다.\n\n<strong>6세</>: 6세 이상에게 적합합니다.\n\n<strong>전체 이용가</>: 모든 연령에게 적합합니다.\n\n등급에 대해 자세히 알아보기: https://www.globalratings.com/ratings-guide-classind"),("pl","Ustaw klasyfikację treści dla wszystkich urządzeń używających tego konta. Przygody mające klasyfikację wyższą niż wybrana będą wymagać PIN-u do odblokowania.\n\n<strong>16 lat</>: odpowiednie dla osób w wieku 16 lat i starszych.\n\n<strong>14 lat</>: odpowiednie dla osób w wieku 14 lat i starszych.\n\n<strong>12 lat</>: odpowiednie dla osób w wieku 12 lat i starszych.\n\n<strong>10 lat</>: odpowiednie dla osób w wieku 10 lat i starszych.\n\n<strong>6 lat</>: odpowiednie dla osób w wieku 6 lat i starszych.\n\n<strong>Wszystkie grupy wiekowe</>: odpowiednie dla wszystkich grup wiekowych.\n\nDowiedz się więcej o klasyfikacjach wiekowych: https://www.globalratings.com/ratings-guide-classind"),("pt-BR","Defina a classificação de conteúdo para todos os dispositivos usando esta conta. Experiências com classificação indicativa superior à selecionada exigirão um PIN para serem desbloqueadas.\n\n<strong>16 anos</>: Adequado para maiores de 16 anos.\n\n<strong>14 anos</>: Adequado para maiores de 14 anos.\n\n<strong>12 anos</>: Adequado para maiores de 12 anos.\n\n<strong>10 anos</>: Adequado para maiores de 10 anos.\n\n<strong>6 anos</>: Adequado para maiores de 6 anos.\n\n<strong>Todas as idades</>: Adequado para todas as idades.\n\nSaiba mais sobre as classificações: https://www.globalratings.com/ratings-guide-classind"),("ru","Выбранное возрастное ограничение для материалов будет действовать на всех устройствах, где используется эта учётная запись. Чтобы разблокировать материалы, рейтинг которых выходит за рамки ограничений, понадобится ввести PIN-код.\n\n<strong>16 лет</>: подходит для игроков 16 лет и старше.\n\n<strong>14 лет</>: подходит для игроков 14 лет и старше.\n\n<strong>12 лет</>: подходит для игроков 12 лет и старше.\n\n<strong>10 лет</>: подходит для игроков 10 лет и старше.\n\n<strong>6 лет</>: подходит для игроков 6 лет и старше.\n\n<strong>Для всех</>: подходит для игроков любого возраста.\n\nПодробнее о возрастных рейтингах: https://www.globalratings.com/ratings-guide-classind"),("th","ตั้งค่าการจัดเรตเนื้อหาให้กับอุปกรณ์ทั้งหมดที่ใช้บัญชีนี้ ประสบการณ์การรับชมเนื้อหาที่ได้รับการจัดเรตที่สูงกว่าระดับการจัดอันดับที่เลือกนั้น จำเป็นต้องใช้รหัส PIN เพื่อปลดล็อก\n\n<strong>16 ปี</>: เหมาะสำหรับผู้ที่มีอายุ 16 ปีขึ้นไป\n\n<strong>14 ปี</>: เหมาะสำหรับผู้ที่มีอายุ 14 ปีขึ้นไป\n\n<strong>12 ปี</>: เหมาะสำหรับผู้ที่มีอายุ 12 ปีขึ้นไป\n\n<strong>10 ปี</>: เหมาะสำหรับผู้ที่มีอายุ 10 ปีขึ้นไป\n\n<strong>6 ปี</>: เหมาะสำหรับผู้ที่มีอายุ 6 ปีขึ้นไป\n\n<strong>ทุก ช่วงอายุ</>: เหมาะสำหรับทุกเพศทุกวัย\n\nเรียนรู้ เพิ่มเติมเกี่ยวกับการจัดเรตเนื้อหาได้ที่: https://www.globalratings.com/ratings-guide-classind"),("tr","Bu hesabı kullanan tüm cihazlar için içerik derecelendirmesini belirle. Seçili derecelendirmeden daha yüksek bir derecelendirmeye sahip deneyimlerin açılması için PIN kodu gerekir.\n\n<strong>16 yaş</>: 16 ve üzeri yaşlar için uygundur.\n\n<strong>14 yaş</>: 14 ve üzeri yaşlar için uygundur.\n\n<strong>12 yaş</>: 12 ve üzeri yaşlar için uygundur.\n\n<strong>10 yaş</>: 10 ve üzeri yaşlar için uygundur.\n\n<strong>6 yaş</>: 6 ve üzeri yaşlar için uygundur.\n\n<strong>Tüm yaşlar</>: Her yaş için uygundur.\n\nDerecelendirme hakkında daha fazla bilgi almak için: https://www.globalratings.com/ratings-guide-classind"),("vi","Thiết lập xếp hạng nội dung cho mọi thiết bị sử dụng tài khoản này. Chế độ chơi có xếp hạng độ tuổi cao hơn giới hạn đã chọn sẽ cần dùng mã PIN để mở khóa.\n\n<strong>16 tuổi</> - Phù hợp với người chơi từ 16 tuổi trở lên.\n\n<strong>14 tuổi</> - Phù hợp với người chơi từ 14 tuổi trở lên.\n\n<strong>12 tuổi</>: Phù hợp với người chơi từ 12 tuổi trở lên.\n\n<strong>10 tuổi</>: Phù hợp với người chơi từ 10 tuổi trở lên.\n\n<strong>6 tuổi</>: Phù hợp với người chơi từ 6 tuổi trở lên.\n\n<strong>Mọi độ tuổi</>: Phù hợp với mọi lứa tuổi.\n\nTìm hiểu thêm về xếp hạng độ tuổi: https://www.globalratings.com/ratings-guide-classind"),("zh-hans","为使用此账号的所有设备设置内容评级。高于所选评级的内容需要PIN码才可解锁。\n\n<strong>16岁</>：适合16岁及以上年龄段。\n\n<strong>14岁</>：适合14岁及以上年龄段。\n\n<strong>12岁</>：适合12岁及以上年龄段。\n\n<strong>10岁</>：适合10岁及以上年龄段。\n\n<strong>6岁</>：适合6岁及以上年龄段。\n\n<strong>全年龄</>：适合所有年龄段。\n\n了解更多关于评级的信息：https://www.globalratings.com/ratings-guide-classind"),("zh-Hant","設定此帳號在所有裝置上使用的內容分級。高於所選分級的體驗將需要 PIN 碼才能解鎖。\n\n<strong>16 歲</>：適合 16 歲以上玩家。\n\n<strong>14 歲</>：適合 14 歲以上玩家。\n\n<strong>12 歲</>：適合 12 歲以上玩家。\n\n<strong>10 歲</>：適合 10 歲以上玩家。\n\n<strong>6 歲</>：適合 6 歲以上玩家。\n\n<strong>全年齡</>：適合所有年齡玩家。\n\n若要瞭解更多關於分級的資訊：https://www.globalratings.com/ratings-guide-classind"))) 
+TextReplacements=(Category=Game, Namespace="", Key="91C7B0D248DC4EB6980F5C8873213793", NativeString="Creates a fiery burst when you deal enough damage to an enemy! Required damage decreases at each Level Up: 175 Damage -> 150 Damage -> 125 Damage -> 100 Damage -> 75 Damage to trigger", LocalizedStrings=(("ar","تُحدث دفعات نارية عند إلحاق ضرر كافٍ بالعدو! يقل الضرر المطلوب عند رفع كل مستوى: 150 من الضرر -> 125 من الضرر -> 100 من الضرر -> 75 من الضرر -> 50 من الضرر للتفعيل"),("en","Creates a fiery burst when you deal enough damage to an enemy! Required damage decreases at each Level Up: 150 Damage -> 125 Damage -> 100 Damage -> 75 Damage -> 50 Damage to trigger"),("de","Erzeugt eine feurige Explosion, wenn du einem Gegner genug Schaden zufügst! Der erforderliche Schaden sinkt mit jedem Levelaufstieg: 150 Schaden –> 125 Schaden –> 100 Schaden –> 75 Schaden –> 50 Schaden, um ausgelöst zu werden."),("es","¡Crea una ráfaga de fuego cuando infliges suficiente daño a un enemigo! A medida que sube el nivel, se reduce el daño necesario para activarse: 150 de daño -> 125 de daño -> 100 de daño -> 75 de daño -> 50 de daño."),("es-419","¡Ocasiona un estallido de fuego cuando infliges suficiente daño a un enemigo! El daño necesario disminuye con cada subida de nivel: 150 de daño -> 125 de daño -> 100 de daño -> 75 de daño -> 50 de daño para activarse."),("fr","Produit une déflagration lorsque vous infligez suffisamment de dégâts à un ennemi ! Les dégâts requis diminuent à chaque gain de niveau : 150 points de dégâts -> 125 points de dégâts -> 100 points de dégâts -> 75 points de dégâts -> 50 points de dégâts pour se déclencher."),("id","Menghasilkan ledakan api saat kamu menimbulkan damage yang cukup pada musuh! Damage yang diperlukan berkurang tiap kali Naik Level: 150 Damage -> 125 Damage -> 100 Damage -> 75 Damage -> 50 Damage untuk memicu"),("it","Crea un'esplosione infuocata quando infliggi abbastanza danni a un nemico! I danni richiesti diminuiscono a ogni aumento di livello: 150 danni -> 125 danni -> 100 danni -> 75 danni -> 50 danni per attivare"),("ja","敵に一定量のダメージを与えると爆発が発生する！ レベルアップのたびに所要ダメージ量が減少: 150ダメージ -> 125ダメージ -> 100ダメージ -> 75ダメージ -> 50ダメージで発動する"),("ko","적에게 일정량의 피해를 주면 화염 폭발이 일어납니다! 레벨이 오를 때마다 화염 폭발 발동에 필요한 피해량이 150 -> 125 -> 100 -> 75 -> 50으로 감소합니다."),("pl","Tworzy ognistą serię po zadaniu poważnych obrażeń wrogowi! Wymagane obrażenia zmniejszają się przy każdym awansie: 150 pkt obrażeń -> 125 pkt obrażeń -> 100 pkt obrażeń -> 75 pkt obrażeń -> 50 pkt obrażeń do aktywacji"),("pt-BR","Cria uma explosão flamejante quando você causa dano suficiente a um inimigo! Dano necessário diminui a cada Subida de Nível: 150 de dano → 125 de dano → 100 de dano → 75 de dano → 50 de dano para ativar"),("ru","Когда вы наносите противнику определённое количество урона, происходит огненный взрыв! С каждым новым уровнем требуемое для взрыва количество урона снижается: 150 ед. -> 125 ед. -> 100 ед. -> 75 ед. -> 50 ед."),("th","สร้างระเบิดเพลิงเมื่อคุณสร้างความเสียหายใส่ศัตรูถึงจำนวนที่กำหนด! เงื่อนไขความเสียหายจะลดลงทุกครั้งที่เลเวลอัป: 150 -> 125 -> 100 -> 75 -> 50 หน่วย"),("tr","Bir düşmana ciddi hasar verdiğinde alevli bir patlama meydana gelir! Seviye atladıkça gereken hasar azalır: Tetiklemek için 150 Hasar -> 125 Hasar -> 100 Hasar -> 75 Hasar -> 50 Hasar"),("vi","Tạo ra một luồng lửa bùng nổ khi bạn gây đủ sát thương lên kẻ địch! Giảm dần sát thương cần thiết theo mỗi lần Tăng Cấp: 150 Sát Thương -> 125 Sát Thương -> 100 Sát Thương -> 75 Sát Thương -> 50 Sát Thương để kích hoạt."),("zh-hans","重创敌人时触发火焰爆发！每次升级时所需伤害降低：150点伤害 -> 125点伤害 -> 100点伤害 -> 75点伤害 -> 50点伤害触发"),("zh-Hant","對敵人造成足夠傷害時，會造成火星飛濺！每次升級均會降低所需傷害：150 傷害 -> 125 傷害 -> 100 傷害 -> 75 傷害 -> 50 傷害即可觸發")))
