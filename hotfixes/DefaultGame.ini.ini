+TextReplacements=(Category=Game, Namespace="", Key="CBFEE62D448749B876D189BE7C0449E9", NativeString="Earn points on <Bold>Tap Vocals</> or <Bold>Mic Vocals</>", LocalizedStrings=(("ar","اربح نقاطًا عن طريق <Bold>الصوتيات (الأزرار)</> أو <Bold>الكاريوكي</>"),("en","Earn points on <Bold>Tap Vocals</> or <Bold>Karaoke</>"),("de","Erziele Punkte in der Rolle <Bold>Tipp-Gesang</> oder <Bold>Karaoke</>"),("es","Consigue puntos al <Bold>cantar con voz (clásica)</> o al <Bold>cantar karaoke</>"),("es-419","Obtén puntos con <Bold>voz (estándar)</> o <Bold>karaoke</>"),("fr","Marquer des points au <Bold>chant version classique</> ou au <Bold>karaoké</>"),("id","Dapatkan poin di <Bold>Vokal Standar</> atau <Bold>Karaoke</>"),("it","Ottieni punti come <Bold>voce (comandi)</> o al <Bold>karaoke</>"),("ja","<Bold>タップボーカル</>か<Bold>カラオケ</>でポイントを獲得しよう"),("ko","<Bold>탭 보컬</> 또는 <Bold>노래방</>으로 점수 획득"),("pl","Zdobądź punkty w <Bold>wokalu dotykowym</> lub <Bold>karaoke</>"),("pt-BR","Ganhe pontos com <Bold>Vocal (Botões)</> ou <Bold>Karaokê</>"),("ru","Заработайте очки <Bold>вокал касанием</> или <Bold>караоке</>"),("th","ทำคะแนนในโหมด<Bold>นักร้อง (เคาะจังหวะ)</>หรือ<Bold>คาราโอเกะ</>"),("tr","<Bold>Basmalı Vokal</> veya <Bold>Karaoke</>de puan kazan"),("vi","Tích lũy điểm ở vị trí <Bold>Hòa Ca Bằng Phím Nhấn</> hoặc <Bold>Karaoke</>"),("zh-hans","在<Bold>触屏主唱</>模式或<Bold>卡拉OK</>模式中获得分数"),("zh-Hant","用<Bold>擊鍵主唱</>或<Bold>卡拉 OK</>來獲得分數")))
+TextReplacements=(Category=Game, Namespace="", Key="253EA5E644A9C9DA105D90AE56723A95", NativeString="Sing out loud on new Mic Vocals, or play along on Tap Vocals!", LocalizedStrings=(("ar","غنِّ بأعلى صوت في وضع الكاريوكي الجديد، أو استخدم الصوتيات (الأزرار)!"),("en","Sing out loud on new Karaoke, or play along on Tap Vocals!"),("de","Singe selbst mit Karaoke (jetzt neu!) oder spiele mit dem Tipp-Gesang mit!"),("es","Canta a pleno pulmón con la nueva función de karaoke o acompaña el ritmo con voz (clásica)."),("es-419","¡Canta a todo pulmón con la nueva función de karaoke o acompaña con voz (estándar)!"),("fr","Chantez à tue-tête avec le nouveau mode karaoké, ou jouez en rythme avec le chant version classique !"),("id","Bernyanyilah dengan lantang di Karaoke baru, atau mainkan Vokal Standar!"),("it","Canta a squarciagola con la nuova funzione Karaoke, oppure accompagna la canzone con la funzione Voce (comandi)!"),("ja","新登場のカラオケで声を出して歌うか、タップボーカルで演奏に合わせてプレイしよう！"),("ko","새로운 노래방으로 크게 노래하거나 탭 보컬로 함께 연주하세요!"),("pl","Śpiewaj dzięki nowej opcji karaoke albo przygrywaj na wokalu dotykowym!"),("pt-BR","Cante em voz alta com o novo Karaokê, ou jogue com o Vocal (Botões)!"),("ru","Пойте в полную силу, исполняя караоке, или используйте вокал касанием!"),("th","ร้องออกมาให้สุดเสียงด้วยโหมดคาราโอเกะแบบใหม่ หรือเล่นตามจังหวะด้วยโหมดนักร้อง (เคาะจังหวะ)!"),("tr","Yeni Mikrofon Vokali ile sesini duyur veya Basmalı Vokal ile oynayarak eşlik et!"),("vi","Cất vang giọng hát khi ở vị trí Karaoke hoặc chơi theo nhịp ở vị trí Hòa Ca Bằng Phím Nhấn!"),("zh-hans","用全新的卡拉OK模式放声高歌，也可以使用触屏主唱模式跟随伴奏表演！"),("zh-Hant","用全新的卡拉 OK 大聲歌唱，或用擊鍵主唱跟著節奏演出！")))
