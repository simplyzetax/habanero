+TextReplacements=(Category=Game, Namespace="", Key="A98605D84DC35AED0EA8909B15BE24D7", NativeString="Blank", LocalizedStrings=(("ar","معتمد من حارس الفضاء. ملصق شاحنة توصيل كوكب البيتزا المخصص."),("en","Space Ranger approved. Pizza Planet Delivery Truck custom decal."),("de","Von Space Ranger genehmigt. Pizza Planet-Lieferwagen, angepasster Aufkleber."),("es","Aprobada por el guardián espacial. Calcomanía personalizada de la Camioneta de reparto del Pizza Planet."),("es-419","Apta para guardianes espaciales. Calcomanía personalizada de Camioneta de reparto de Pizza Planeta."),("fr","Homologuée par les Rangers de l'espace. Un sticker personnalisé pour le camion de livraison de Pizza Planète"),("id","Disetujui oleh Space Ranger. Stiker kustom Truk Pengiriman Pizza Planet."),("it","Approvato dagli Space Ranger. Adesivo personalizzato per Camioncino Pizza Planet."),("ja","スペース・レンジャー公認。ピザ・プラネット配達トラックのカスタムデカール。"),("ko","우주 대원이 인정하는 피자 플래닛 배달 트럭 커스텀 데칼입니다."),("pl","Zatwierdzony przez strażnika kosmosu. Własny wzór Wozu Dostawczego Pizza Planet."),("pt-BR","Aprovado pelos patrulheiros espaciais. Adesivo personalizado da Caminhonete de Entregas do Pizza Planet."),("ru","Космический рейнджер одобряет. Особая декаль внедорожника «Планеты пицца»."),("th","สเปซเรนเจอร์การันตี ลายแต่งคัสตอมรถส่งพิซซ่าร้านดาวเคราะห์พิซซ่า"),("tr","Uzay Koruyucusu onaylı. Pizza Gezegeni Teslimat Kamyonu özel çıkartması."),("vi","Được Đội Cảnh Sát Vũ Trụ cấp phép. Hình dán tùy chỉnh Xe Tải Giao Hàng Pizza Planet."),("zh-hans","太空骑警认证。披萨星球送餐车自定义涂装。"),("zh-Hant","太空騎警認證。比薩星球外送車自訂貼花。")))
