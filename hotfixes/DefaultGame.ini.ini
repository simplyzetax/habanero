+TextReplacements=(Category=Game, Namespace="", Key="D9A5754140871CEF1AFED7B4593C2AB1", NativeString="Quest Description", LocalizedStrings=(("ar","اعزف \"Gabriela\" واربح نجمتين أو أكثر"),("en","Play \"Gabriela\" and earn 2 or more Stars"),("de","Spiele „Gabriela“ und verdiene mindestens 2 Sterne"),("es","Toca \"Gabriela\" y consigue 2 estrellas o más"),("es-419","Toca \"Gabriela\" y consigue 2 estrellas o más"),("fr","Jouer Gabriela et obtenir au moins 2 étoiles"),("id","Mainkan \"Gabriela\" dan dapatkan 2 Bintang atau lebih"),("it","Esegui \"Gabriela\" e ottieni 2 o più Stelle"),("ja","「Gabriela」をプレイして2スター以上を獲得する"),("ko","\'Gabriela\'를 연주하고 별점 2개 이상 획득"),("pl","Ukończ utwór „Gabriela”, zdobywając co najmniej 2 gwiazdki"),("pt-BR","Consiga 2 ou mais Estrelas tocando \"Gabriela\""),("ru","Исполните Gabriela и получите не менее 2 звёзд"),("th","เล่นเพลง \"Gabriela\" และได้รับดาว 2 ดวงขึ้นไป"),("tr","\"Gabriela\" şarkısını çal ve en az 2 yıldız kazan"),("vi","Biểu diễn \"Gabriela\" và tích lũy từ 2 Sao trở lên"),("zh-hans","演奏《Gabriela》并至少获得2星"),("zh-Hant","演奏《Gabriela》並獲得 2 星或以上評價")))
