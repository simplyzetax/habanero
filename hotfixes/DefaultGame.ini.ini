+TextReplacements=(Category=Game, Namespace="", Key="A9C9782B4B409BE561887A9C31132482", NativeString="EmptyDescription", LocalizedStrings=(("ar","من بظ يطير إلى قيادة النجوم. أجيبوا... هل هذا الشيء يعمل؟"),("en","Buzz Lightyear to Star Command. Come in, Star Command... Is this thing on?"),("de","Buzz Lightyear an Star Command. Star Command, bitte kommen ... Ist das Ding an?"),("es","Buzz Lightyear a Mando Estelar. Adelante, Mando Estelar... ¿Esto está encendido?"),("es-419","Buzz Lightyear a Comando Estelar. Adelante, Comando Estelar... ¿Por qué no contestan?"),("fr","Buzz l'Éclair à Star Command. Star Command, répondez, est-ce que vous me recevez ?"),("id","Buzz Lightyear ke Komando Bintang. Halo, Komando Bintang .... Apa ini sudah menyala?"),("it","Buzz Lightyear a Comando Stellare. Comando Stellare, rispondete... È acceso questo coso?"),("ja","スターコマンド、こちらバズ・ライトイヤー。スターコマンド、応答せよ… これ、電源入ってるか？"),("ko","우주 지휘선, 여기는 버즈 라이트이어. 우주 지휘선, 응답하라... 이거 켜진 거 맞아?"),("pl","Buzz Astral do Gwiezdnej Bazy. Gwiezdna Bazo, zgłoś się... Słychać mnie?"),("pt-BR","Buzz Lightyear para o Comando Estelar. Responda, Comando Estelar... Isso tá ligado?"),("ru","Базз Лайтер вызывает звёздный центр. Звёздный центр, приём, как слышите?"),("th","บัซ ไลท์เยียร์ เรียกศูนย์บัญชาการสตาร์คอมมานด์ ศูนย์บัญชาการ ได้ยินไหม... เจ้านี่มันยังใช้งานได้อยู่หรือเปล่า?"),("tr","Yıldız Kumanda, ben Buzz Lightyear. Cevap ver Yıldız Kumanda... Bu şey açık mı?"),("vi","Buzz Lightyear gọi Tổng Chỉ Huy Tinh Tú. Trả lời đi, Tổng Chỉ Huy Tinh Tú... Đường dây có kết nối không nhỉ?"),("zh-hans","巴斯光年呼叫星际总部。收到请回答，星际总部……这东西电源开了吗？"),("zh-Hant","巴斯光年呼叫星際總部。收到了請回答……聽得到嗎？")))
